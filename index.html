<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>半吊子廚房 POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#F7F3EE;color:#1E1512;font-size:14px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1E1512;color:#F7F3EE;flex-shrink:0}
.hdr-logo{font-size:15px;font-weight:700;letter-spacing:1px}
.hdr-sub{font-size:10px;color:#A89080;margin-top:1px}
.hdr-r{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.dot.off{background:#F44336}
.chip{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700}
.cw{background:#7A4F00;color:#FFD080}
.cd{background:#6A1010;color:#FFB0B0}
.ce{background:#4A1010;color:#FFB0B0}
/* ── Nav ── */
.nav{display:flex;background:#FFF;border-top:1px solid #DDD3C8;flex-shrink:0;height:56px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:#8A7060;font-family:inherit;padding:4px 2px}
.nb:active{background:#F0E8E0}
.nb.on{color:#1E1512}
.nb-ic{font-size:18px;line-height:1}
.nb-lb{font-size:10px;font-weight:700}
.nb.on .nb-lb{color:#C07040}
/* ── Layout ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.page{flex:1;overflow-y:auto;padding:12px;min-height:0}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
/* ── POS ── */
.pos-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.prod-zone{flex:1;overflow-y:auto;padding:8px;min-height:0}
.prod-zone::-webkit-scrollbar{width:3px}
.prod-zone::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pc{background:#FFF;border:1.5px solid #E5D9CF;border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;user-select:none;position:relative}
.pc:active{background:#FFF0E6;border-color:#C07040;transform:scale(.96)}
.pc.sold{opacity:.3;pointer-events:none}
.pc-n{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.4;min-height:32px;display:flex;align-items:center;justify-content:center}
.pc-p{font-size:14px;font-weight:700}
.pc-s{font-size:10px;margin-top:3px}
.s-lo{color:#C07000;font-weight:700}
.s-ou{color:#C04030;font-weight:700}
.s-ok{color:#AFA090}
.badge{position:absolute;top:-6px;right:-6px;background:#C07040;color:#FFF;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #F7F3EE}
.exp-tag{position:absolute;top:-6px;left:-6px;background:#C03020;color:#FFF;font-size:9px;font-weight:700;padding:2px 5px;border-radius:999px;border:1.5px solid #F7F3EE}
/* ── Cart ── */
.cart-zone{flex-shrink:0;background:#FFF;border-top:1.5px solid #EDE5DC;max-height:44vh;display:flex;flex-direction:column}
.cart-scroll{overflow-y:auto;flex:1;min-height:0}
.cart-scroll::-webkit-scrollbar{width:3px}
.cart-scroll::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
.cart-empty{font-size:13px;color:#AFA090;text-align:center;padding:10px 0}
.ci{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:.5px solid #F0E8E0}
.ci-n{font-size:13px;font-weight:700;flex:1}
.ci-pr{font-size:11px;color:#AFA090}
.qc{display:flex;align-items:center;gap:4px}
.qb{width:28px;height:28px;border-radius:8px;border:1px solid #D5C9BF;background:#F7F3EE;color:#1E1512;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.qb:active{background:#E5D9CF}
.qn{font-size:14px;font-weight:700;min-width:22px;text-align:center}
.ci-s{font-size:13px;font-weight:700;min-width:56px;text-align:right}
/* ── Custom amount panel ── */
.amt-panel{background:#FFF8F0;border-top:1px solid #F0D8C0;padding:8px 12px;flex-shrink:0}
.amt-title{font-size:11px;font-weight:700;color:#9A8070;margin-bottom:6px;text-transform:uppercase}
.amt-quick{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.aq{padding:6px 11px;border:1px solid #C07040;border-radius:999px;background:none;color:#C07040;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.aq:active{background:#FFF0E6}
.aq.sel{background:#C07040;color:#FFF}
.amt-row{display:flex;align-items:center;gap:8px}
.amt-inp{flex:1;padding:8px 12px;border:1.5px solid #C07040;border-radius:10px;font-size:18px;font-weight:700;font-family:inherit;background:#FFF;color:#1E1512;text-align:right}
.amt-inp:focus{outline:none}
.amt-cancel{padding:8px 12px;border:1px solid #D5C9BF;border-radius:10px;background:none;color:#7A6050;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
/* ── Checkout bar ── */
.co-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid #EDE5DC;flex-shrink:0;background:#FFF}
.co-sum{flex:1}
.co-cnt{font-size:11px;color:#AFA090}
.co-tot{font-size:20px;font-weight:700;line-height:1.1}
.co-orig{font-size:11px;color:#AFA090;text-decoration:line-through;margin-left:4px}
.co-cus{font-size:11px;background:#E8F5E8;color:#2A7A2A;padding:2px 6px;border-radius:999px;font-weight:700;margin-left:4px}
.edit-btn{padding:8px 10px;border:1.5px solid #C07040;border-radius:10px;background:none;color:#C07040;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.edit-btn.on{background:#C07040;color:#FFF}
.edit-btn:disabled{border-color:#D5C9BF;color:#AFA090}
.co-btn{padding:12px 18px;background:#1E1512;color:#F7F3EE;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.co-btn:active{background:#C07040}
.co-btn:disabled{background:#C5B8AF}
.ok-strip{background:#E8F5E8;border-top:1px solid #80C080;padding:6px 12px;font-size:13px;color:#2A6A2A;font-weight:700;text-align:center;flex-shrink:0}
/* ── Shared ── */
.sec{font-size:11px;font-weight:700;color:#9A8070;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
/* ── Inventory ── */
.exp-banner{background:#FFF0EE;border:1.5px solid #FFAAAA;border-radius:14px;padding:14px;margin-bottom:12px}
.exp-title{font-size:13px;font-weight:700;color:#C03020;margin-bottom:8px}
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid #FFD0C8}
.exp-row:last-child{border-bottom:none}
.exp-name{font-size:13px;font-weight:700}
.exp-detail{font-size:12px;color:#C03020;font-weight:600}
.exp-days{font-size:11px;background:#FFEEEE;color:#C03020;padding:2px 7px;border-radius:999px;font-weight:700;margin-left:6px}
.exp-msg{font-size:12px;color:#C07040;margin-top:8px;font-style:italic}
.inv-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-bottom:12px}
.inv-hdr{padding:10px 14px;background:#F7F3EE;border-bottom:1px solid #EDE5DC;font-size:12px;font-weight:700;color:#9A8070;text-transform:uppercase;letter-spacing:.5px}
.inv-row{padding:10px 14px;border-top:1px solid #EDE5DC}
.inv-top{display:flex;align-items:center;gap:6px}
.inv-inf{flex:1}
.inv-nm{font-size:14px;font-weight:700}
.inv-un{font-size:11px;color:#AFA090;margin-top:1px}
.inv-st{font-size:18px;font-weight:700;min-width:36px;text-align:center}
.c-ok{color:#2A7A2A}.c-wa{color:#B06000}.c-er{color:#C03020}
.sc{display:flex;gap:4px}
.sb{width:32px;height:32px;border-radius:8px;border:1px solid #D5C9BF;background:#F7F3EE;color:#1E1512;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sb:active{background:#E5D9CF}
.in-btn{padding:5px 10px;border:1px solid #2A7A2A;border-radius:999px;background:none;color:#2A7A2A;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.adj-btn{padding:5px 10px;border:1px solid #C07040;border-radius:999px;background:none;color:#C07040;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
/* ── In form ── */
.in-form{background:#F0FAF0;border:1px solid #A0D0A0;border-radius:10px;padding:12px;margin-top:8px}
.in-title{font-size:12px;font-weight:700;color:#2A7A2A;margin-bottom:10px}
.in-lbl{font-size:11px;color:#9A8070;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase}
.in-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.iqb{width:36px;height:36px;border-radius:10px;border:1.5px solid #2A7A2A;background:#FFF;color:#2A7A2A;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.iqb:active{background:#E8F5E8}
.iqb.wide{width:auto;padding:0 10px;font-size:13px}
.iq-val{font-size:22px;font-weight:700;min-width:44px;text-align:center}
.in-date{width:100%;padding:10px;border:1.5px solid #D5C9BF;border-radius:10px;font-size:14px;font-family:inherit;background:#FFF;color:#1E1512;margin-bottom:10px}
.in-date:focus{outline:none;border-color:#2A7A2A}
.form-btns{display:flex;gap:8px}
.f-ok{flex:2;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#FFF}
.f-ok.green{background:#2A7A2A}
.f-ok.green:active{background:#1E5A1E}
.f-ok.amber{background:#C07040}
.f-ok.amber:active{background:#A05020}
.f-ok:disabled{opacity:.4}
.f-cancel{flex:1;padding:11px;background:none;border:1px solid #D5C9BF;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#7A6050}
/* ── Adj form ── */
.adj-form{background:#FFF8E8;border:1px solid #E0C040;border-radius:10px;padding:12px;margin-top:8px}
.adj-title{font-size:12px;font-weight:700;color:#7A5000;margin-bottom:10px}
.adj-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.aqb{width:36px;height:36px;border-radius:10px;border:1.5px solid #C07040;background:#FFF;color:#C07040;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.aqb:active{background:#FFF0E0}
.aqb.wide{width:auto;padding:0 10px;font-size:13px}
.aq-val{font-size:20px;font-weight:700;min-width:44px;text-align:center}
.aq-pos{color:#2A7A2A}
.aq-neg{color:#C03020}
.adj-note{width:100%;padding:10px;border:1.5px solid #D5C9BF;border-radius:10px;font-size:14px;font-family:inherit;background:#FFF;color:#1E1512;margin-bottom:10px}
.adj-note:focus{outline:none;border-color:#C07040}
/* ── Batch list ── */
.b-list{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.b-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;background:#F7F3EE;font-size:12px}
.b-item.old{background:#FFEEEE;border:1px solid #FFB0B0}
.b-date{color:#7A6050;font-weight:600;flex:1}
.b-qty{font-weight:700}
.b-age-ok{font-size:10px;color:#2A7A2A;background:#E8F5E8;padding:1px 6px;border-radius:999px}
.b-age-er{font-size:10px;color:#C03020;background:#FFEEEE;padding:1px 6px;border-radius:999px}
/* ── Reports ── */
.tabs2{display:flex;gap:6px;margin-bottom:12px}
.t2{flex:1;padding:9px 4px;font-size:12px;font-weight:700;border:1px solid #D5C9BF;border-radius:10px;cursor:pointer;background:#FFF;color:#8A7060;font-family:inherit;text-align:center}
.t2.on{background:#1E1512;color:#FFF;border-color:#1E1512}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.s-card{background:#FFF;border:1px solid #E5D9CF;border-radius:12px;padding:10px 12px}
.s-lbl{font-size:10px;font-weight:700;color:#9A8070;margin-bottom:4px;text-transform:uppercase}
.s-val{font-size:18px;font-weight:700}
.s-sub{font-size:10px;color:#AFA090;margin-top:2px}
.tx-list{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden}
.tx{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid #EDE5DC}
.tx:first-child{border-top:none}
.tx-inf{flex:1}
.tx-t{font-size:12px;color:#7A6050;font-weight:700}
.tx-i{font-size:11px;color:#AFA090;margin-top:2px;line-height:1.5}
.tx-v{font-size:14px;font-weight:700;white-space:nowrap}
.tx-del{width:32px;height:32px;border-radius:8px;border:1px solid #FFAAAA;background:none;color:#C03020;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.empty{padding:24px;text-align:center;font-size:13px;color:#AFA090}
.cfm-box{background:#FFF;border:2px solid #FFAAAA;border-radius:14px;padding:14px;margin-bottom:12px}
.cfm-title{font-size:15px;font-weight:700;margin-bottom:6px}
.cfm-detail{font-size:13px;color:#7A6050;margin-bottom:12px;line-height:1.6}
.cfm-btns{display:flex;gap:8px}
.cfm-no{flex:1;padding:11px;border:1px solid #D5C9BF;border-radius:10px;background:#FFF;color:#1E1512;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.cfm-yes{flex:1;padding:11px;border:none;border-radius:10px;background:#C03020;color:#FFF;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.clr-btn{padding:7px 12px;border:1px solid #FFAAAA;border-radius:8px;background:none;color:#C03020;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
/* ── Flavor table ── */
.fl-tbl{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-bottom:12px}
.fl-hdr{display:grid;grid-template-columns:1fr 52px 80px;background:#F7F3EE}
.fl-hdr span{font-size:11px;font-weight:700;color:#9A8070;padding:8px 12px}
.fl-hdr span:not(:first-child){text-align:right}
.fl-row{display:grid;grid-template-columns:1fr 52px 80px;border-top:1px solid #EDE5DC}
.fl-row.hi{background:#FFFBF0}
.fl-row span{font-size:13px;padding:9px 12px}
.fl-row span:not(:first-child){text-align:right;font-weight:700}
.fl-nm{font-weight:600}
.fl-bar{height:3px;background:#F0E8E0;border-radius:999px;overflow:hidden;margin:0 12px 6px}
.fl-bar-f{height:100%;background:#C07040;border-radius:999px}
/* ── Month report ── */
.mon-row{display:flex;gap:8px;margin-bottom:12px}
.mon-sel{flex:1;padding:10px;border:1px solid #D5C9BF;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;background:#FFF;color:#1E1512}
.csv-btn{padding:10px 14px;border:1px solid #D5C9BF;border-radius:10px;background:#FFF;color:#7A6050;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.bar-wrap{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:12px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:12px;font-weight:600;color:#7A6050;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:#F0E8E0;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:#1E1512;border-radius:999px}
.bar-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}
.m-tbl{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden}
.m-hdr{display:grid;grid-template-columns:1fr 60px 80px;background:#F7F3EE}
.m-hdr span{font-size:11px;font-weight:700;color:#9A8070;padding:8px 12px}
.m-hdr span:not(:first-child){text-align:right}
.m-row{display:grid;grid-template-columns:1fr 60px 80px;border-top:1px solid #EDE5DC}
.m-row.tot{background:#F7F3EE}
.m-row span{font-size:13px;padding:10px 12px}
.m-row span:not(:first-child){text-align:right}
.m-nm{font-weight:700}
/* ── Movements ── */
.mv-filt{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.mv-filt-lbl{font-size:11px;font-weight:700;color:#9A8070}
.filt-btn{padding:6px 11px;border:1px solid #D5C9BF;border-radius:999px;background:#FFF;color:#7A6050;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.filt-btn.on{background:#1E1512;color:#FFF;border-color:#1E1512}
.filt-btn.in-on{background:#2A7A2A;color:#FFF;border-color:#2A7A2A}
.filt-btn.out-on{background:#C03020;color:#FFF;border-color:#C03020}
.filt-btn.adj-on{background:#C07040;color:#FFF;border-color:#C07040}
.filt-date{padding:6px 10px;border:1px solid #D5C9BF;border-radius:8px;font-size:13px;font-family:inherit;background:#FFF;color:#1E1512}
.mv-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;flex-shrink:0}
.mv-in{background:#E8F5E8;color:#2A7A2A}
.mv-out{background:#FFEEEE;color:#C03020}
.mv-adj{background:#FFF0D0;color:#8A5000}
/* ── Production ── */
.pr-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:14px;margin-bottom:12px}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EDE5DC}
.pr-row:last-of-type{border-bottom:none}
.pr-nm{font-size:14px;font-weight:700}
.pr-in{width:70px;padding:8px;border:1px solid #D5C9BF;border-radius:8px;font-size:16px;font-weight:700;text-align:center;font-family:inherit;background:#F7F3EE;color:#1E1512}
.pr-in:focus{outline:none;border-color:#C07040}
.mat-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:14px;margin-bottom:12px}
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EDE5DC;font-size:13px}
.mr:last-child{border-bottom:none}
.mr-n{color:#7A6050;font-weight:600}
.pb{width:100%;margin-top:10px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.pb-ok{background:#2A7A2A;color:#FFF}
.pb-ok:active{background:#1E5A1E}
.pb-no{background:#E5D9CF;color:#AFA090}
.warn{background:#FFF8E0;border:1px solid #E0C040;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;color:#6A4A00}
.good{background:#E8F5E8;border:1px solid #80C080;border-radius:8px;padding:10px 12px;font-size:13px;color:#2A6A2A;font-weight:600}
.hint{background:#F7F3EE;border-radius:12px;padding:20px;text-align:center;font-size:13px;color:#AFA090}
/* ── Settings ── */
.set-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-bottom:12px}
.set-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#F7F3EE;border-bottom:1px solid #EDE5DC}
.set-hdr span{font-size:13px;font-weight:700;color:#1E1512}
.add-btn{padding:7px 12px;border:1px solid #C07040;border-radius:8px;background:none;color:#C07040;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.set-row{padding:12px 14px;border-top:1px solid #EDE5DC}
.set-lbl{font-size:11px;color:#9A8070;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.set-inp{width:100%;padding:10px 12px;border:1px solid #E5D9CF;border-radius:10px;font-size:14px;font-family:inherit;background:#F7F3EE;color:#1E1512}

/* ════ State ════ */
var G={
  tab:"pos", rv:"today",

/* ════ Utils ════ */
function clone(o){return JSON.parse(JSON.stringify(o));}
function today(){return new Date().toLocaleDateString("zh-TW");}
function nowt(){return new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});}
function curYM(){var d=new Date();return ""+d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2);}
function ymLabel(y){return y.slice(0,4)+"年"+parseInt(y.slice(4))+"月";}
function daysDiff(ds){return Math.floor((Date.now()-new Date(ds))/(864e5));}
function nid(arr){return arr.length?Math.max.apply(null,arr.map(function(x){return x.id;}))+1:1;}
function todaySales(){return (G.sales[curYM()]||[]).filter(function(x){return x.date===today();});}
function allMonths(){
  var s={};(G.months||[]).forEach(function(m){s[m]=1;});s[curYM()]=1;
  return Object.keys(s).sort().reverse();
}
function expiredBatches(){
  var r=[];
  G.stks.forEach(function(stk){
    (G.batches[stk.pid]||[]).filter(function(b){return b.qty>0&&daysDiff(b.prodDate)>10;})
      .forEach(function(b){r.push({name:stk.name,qty:b.qty,days:daysDiff(b.prodDate),pid:stk.pid});});
  });
  return r.sort(function(a,b){return b.days-a.days;});
}
function calcAmt(){
  var sub=G.cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  if(G.showAmt&&G.customAmt!==null){
    var c=parseInt(G.customAmt)||0;
    return {sub:sub,total:c,disc:sub-c,custom:true};
  }
  return {sub:sub,total:sub,disc:0,custom:false};
}
function isReady(){return G.ok_pr&&G.ok_inv&&G.ok_sl&&G.ok_bt&&G.ok_mv;}

/* ════ Save ════ */
function saveInv(){DB.collection("pos").doc("inventory").set({mats:G.mats,stks:G.stks,updatedAt:FTS()}).catch(function(e){console.error(e);});}
function saveProd(){DB.collection("pos").doc("products").set({prods:G.prods,updatedAt:FTS()}).catch(function(e){console.error(e);});}
function saveBatch(){DB.collection("pos").doc("batches").set({batches:G.batches,updatedAt:FTS()}).catch(function(e){console.error(e);});}
function saveMov(){DB.collection("pos").doc("movements").set({mvs:G.mvs,updatedAt:FTS()}).catch(function(e){console.error(e);});}
function saveSales(ym){
  DB.collection("pos").doc("sales_"+ym).set({items:G.sales[ym]||[],updatedAt:FTS()}).catch(function(e){console.error(e);});
  var ms=allMonths();
  DB.collection("pos").doc("meta").set({months:ms}).catch(function(e){console.error(e);});
}
function loadMonth(ym){
  if(G.sales[ym]!==undefined)return;
  DB.collection("pos").doc("sales_"+ym).get().then(function(d){
    G.sales[ym]=d.exists?(d.data().items||[]):[];
    render();
  }).catch(function(){G.sales[ym]=[];render();});
}

/* ════ Listeners ════ */
function startListeners(){
  DB.collection("pos").doc("products").onSnapshot(function(d){
    G.prods=d.exists?(d.data().prods||clone(DP)):clone(DP);
    if(!d.exists)saveProd();
    G.ok_pr=true;if(isReady())render();
  });
  DB.collection("pos").doc("inventory").onSnapshot(function(d){
    if(d.exists){var x=d.data();G.mats=x.mats;G.stks=x.stks;}
    else{G.mats=clone(DM);G.stks=clone(DS);saveInv();}
    G.conn=true;G.ok_inv=true;if(isReady())render();
  },function(){
    document.getElementById("app").innerHTML="<div style='padding:40px;text-align:center;color:#C03020'>無法連接雲端，請確認網路與Firebase設定</div>";
  });
  DB.collection("pos").doc("batches").onSnapshot(function(d){
    G.batches=d.exists?(d.data().batches||{}):{};
    G.ok_bt=true;if(isReady())render();
  });
  DB.collection("pos").doc("movements").onSnapshot(function(d){
    G.mvs=d.exists?(d.data().mvs||[]):[];
    G.ok_mv=true;if(isReady())render();
  });
  DB.collection("pos").doc("sales_"+curYM()).onSnapshot(function(d){
    G.sales[curYM()]=d.exists?(d.data().items||[]):[];
    G.ok_sl=true;if(isReady())render();
  });
  DB.collection("pos").doc("meta").onSnapshot(function(d){
    G.months=d.exists?(d.data().months||[]):[];
    if(!G.selM)G.selM=curYM();
    if(isReady())render();
  });
}

/* ════ Render ════ */
function render(){
  var el=document.getElementById("app");
  if(!el)return;
  if(!isReady()){el.innerHTML="<div class='loading'><div class='spin'></div>載入中...</div>";return;}
  var ap=G.prods.filter(function(p){return p.on!==false;});
  var ls=G.stks.filter(function(x){return x.stock<=5;}).length;
  var lm=G.mats.filter(function(x){return x.stock<=x.min;}).length;
  var le=expiredBatches().length;
  var chips="";
  if(ls>0)chips+="<span class='chip cw'>成品偏低"+ls+"</span>";
  if(lm>0)chips+="<span class='chip cd'>材料不足"+lm+"</span>";
  if(le>0)chips+="<span class='chip ce'>快過期"+le+"</span>";
  var body="";
  if(G.tab==="pos")body=rPOS(ap);
  else if(G.tab==="inv")body="<div class='page'>"+rInv()+"</div>";
  else if(G.tab==="rep")body="<div class='page'>"+rRep()+"</div>";
  else if(G.tab==="prod")body="<div class='page'>"+rProd(ap)+"</div>";
  else body="<div class='page'>"+rSet()+"</div>";
  var nav=[["pos","🧾","收銀"],["inv","📦","庫存"],["rep","📊","業績"],["prod","🍪","生產"],["set","⚙️","設定"]];
  var navHtml=nav.map(function(n){return "<button class='nb"+(G.tab===n[0]?" on":"")+"' onclick="goTab('"+n[0]+"')"><span class='nb-ic'>"+n[1]+"</span><span class='nb-lb'>"+n[2]+"</span></button>";}).join("");
  el.innerHTML=
    "<div class='hdr'>"+
      "<div><div class='hdr-logo'>半吊子廚房</div><div class='hdr-sub'>THE HALF KITCHEN</div></div>"+
      "<div class='hdr-r'><span class='dot"+(G.conn?"":" off")+"'></span>"+chips+"</div>"+
    "</div>"+
    "<div class='main'>"+body+"</div>"+
    "<nav class='nav'>"+navHtml+"</nav>";
}
function goTab(t){
  if(G.tab==="set"&&t!=="set"){G.ep=null;G.em=null;G.es=null;G.sok=false;}
  G.tab=t;G.okMsg="";G.cfm=null;render();
}

/* ════ POS ════ */
function rPOS(prods){
  var am=calcAmt();
  var sub=am.sub,total=am.total,disc=am.disc,custom=am.custom;
  var totalQty=G.cart.reduce(function(s,i){return s+i.qty;},0);
  var h="<div class='pos-wrap'><div class='prod-zone'><div class='pg'>";
  prods.forEach(function(p){
    var sk=null;for(var i=0;i<G.stks.length;i++){if(G.stks[i].pid===p.id){sk=G.stks[i];break;}}
    var s=sk?sk.stock:0;
    var inCart=null;for(var i=0;i<G.cart.length;i++){if(G.cart[i].id===p.id){inCart=G.cart[i];break;}}
    var pb=G.batches[p.id]||[];
    var hasExp=false;for(var i=0;i<pb.length;i++){if(pb[i].qty>0&&daysDiff(pb[i].prodDate)>10){hasExp=true;break;}}
    h+="<div class='pc"+(s===0?" sold":"")+"' onclick='addToCart("+p.id+")'>";
    if(inCart)h+="<div class='badge'>"+inCart.qty+"</div>";
    if(hasExp)h+="<div class='exp-tag'>快過期</div>";
    h+="<div class='pc-n'>"+p.name+"</div>";
    h+="<div class='pc-p'>NT$ "+p.price+"</div>";
    h+="<div class='pc-s "+(s===0?"s-ou":s<=5?"s-lo":"s-ok")+"'>"+(s===0?"已售完":s<=5?"剩"+s+"罐":s+"罐")+"</div>";
    h+="</div>";
  });
  h+="</div></div><div class='cart-zone'>";
  if(G.okMsg)h+="<div class='ok-strip'>✓ 結帳完成！NT$ "+G.okMsg+(G.lastNote?" · "+G.lastNote:"")+"</div>";
  h+="<div class='cart-scroll'>";
  if(G.cart.length===0){h+="<div class='cart-empty'>尚未選擇商品</div>";}
  else{G.cart.forEach(function(i){h+="<div class='ci'><div><div class='ci-n'>"+i.name+"</div><div class='ci-pr'>NT$ "+i.price+"</div></div><div class='qc'><button class='qb' onclick='adjCart("+i.id+",-1)'>−</button><span class='qn'>"+i.qty+"</span><button class='qb' onclick='adjCart("+i.id+",1)'>+</button></div><div class='ci-s'>NT$ "+(i.price*i.qty).toLocaleString()+"</div></div>";});}
  h+="</div>";
  if(G.showAmt){
    h+="<div class='amt-panel'><div class='amt-title'>自訂結帳金額</div><div class='amt-quick'>";
    if(totalQty>0)h+="<button class='aq"+(G.customAmt===sub-totalQty*10?" sel":"")+"' onclick='setAmt("+(sub-totalQty*10)+")'>員工識別證（每罐-$10=-"+(totalQty*10)+"）</button>";
    h+="<button class='aq"+(G.customAmt===0?" sel":"")+"' onclick='setAmt(0)'>公關出貨（$0）</button>";
    h+="<button class='aq"+(G.customAmt===sub?" sel":"")+"' onclick='setAmt("+sub+")'>恢復原價</button>";
    h+="</div><div class='amt-row'><span style='font-size:13px;color:#9A8070;flex-shrink:0'>NT$</span>";
    h+="<input class='amt-inp' type='number' inputmode='numeric' value='"+(G.customAmt!==null?G.customAmt:sub)+"' oninput='G.customAmt=parseInt(this.value)||0;render()'>";
    h+="<button class='amt-cancel' onclick='clearAmt()'>取消</button></div>";
    h+="<div style='font-size:11px;color:#9A8070;margin-top:6px'>原價 NT$ "+sub.toLocaleString()+(disc>0?" 省 NT$ "+disc.toLocaleString():"")+"</div></div>";
  }
  h+="<div class='co-bar'><div class='co-sum'><div class='co-cnt'>"+(totalQty>0?"共 "+totalQty+" 罐":"點擊商品加入")+"</div><div style='display:flex;align-items:baseline;gap:4px;flex-wrap:wrap'><div class='co-tot'>NT$ "+total.toLocaleString()+"</div>";
  if(custom&&disc>0)h+="<span class='co-orig'>NT$ "+sub.toLocaleString()+"</span><span class='co-cus'>自訂</span>";
  else if(custom)h+="<span class='co-cus'>自訂</span>";
  h+="</div></div>";
  h+="<button class='edit-btn"+(G.showAmt?" on":"")+"' onclick='toggleAmt()' "+(G.cart.length===0?"disabled":"")+">✏️ 改金額</button>";
  h+="<button class='co-btn' onclick='checkout()' "+(G.cart.length===0?"disabled":"")+">結帳</button>";
  h+="</div></div></div>";
  return h;
}
function addToCart(pid){
  var p=null;for(var i=0;i<G.prods.length;i++){if(G.prods[i].id===pid){p=G.prods[i];break;}}
  if(!p)return;
  var found=false;
  G.cart=G.cart.map(function(i){if(i.id===pid){found=true;return {id:i.id,name:i.name,price:i.price,qty:i.qty+1};}return i;});
  if(!found)G.cart.push({id:p.id,name:p.name,price:p.price,qty:1});
  G.okMsg="";render();
}
function adjCart(id,d){
  G.cart=G.cart.map(function(i){return i.id===id?{id:i.id,name:i.name,price:i.price,qty:i.qty+d}:i;}).filter(function(i){return i.qty>0;});
  render();
}
function toggleAmt(){G.showAmt=!G.showAmt;if(G.showAmt){G.customAmt=G.cart.reduce(function(s,i){return s+i.price*i.qty;},0);}else{G.customAmt=null;}render();}
function setAmt(v){G.customAmt=v;render();}
function clearAmt(){G.showAmt=false;G.customAmt=null;render();}
function checkout(){
  if(!G.cart.length)return;
  var am=calcAmt();
  var note=am.custom?"自訂金額(原NT$"+am.sub+")":"";
  var ym=curYM();
  var sale={id:Date.now(),date:today(),time:nowt(),items:clone(G.cart),total:am.total,sub:am.sub,disc:am.disc||0,discName:note};
  if(!G.sales[ym])G.sales[ym]=[];
  G.sales[ym].push(sale);
  G.cart.forEach(function(ci){
    var pid=ci.id,rem=ci.qty;
    var bs=(G.batches[pid]||[]).sort(function(a,b){return new Date(a.prodDate)-new Date(b.prodDate);});
    bs.forEach(function(b){if(rem<=0)return;var t=Math.min(b.qty,rem);b.qty-=t;rem-=t;});
    G.batches[pid]=bs;
    G.stks=G.stks.map(function(s){return s.pid===pid?{id:s.id,pid:s.pid,name:s.name,stock:Math.max(0,s.stock-ci.qty)}:s;});
    G.mvs.push({id:Date.now()+Math.random(),type:"out",pid:pid,name:ci.name,qty:ci.qty,date:today(),time:nowt(),note:note});
  });
  G.okMsg=am.total.toLocaleString();G.lastNote=note;
  G.cart=[];G.showAmt=false;G.customAmt=null;
  saveInv();saveBatch();saveMov();saveSales(ym);render();
}

/* ════ Inventory ════ */
function rInv(){
  var expItems=expiredBatches();
  var h="";
  if(expItems.length>0){
    h+="<div class='exp-banner'><div class='exp-title'>⚠ 以下商品已超過 10 天，請加速銷售！</div>";
    expItems.forEach(function(e){h+="<div class='exp-row'><span class='exp-name'>"+e.name+"</span><span class='exp-detail'>"+e.qty+"罐<span class='exp-days'>已"+e.days+"天</span></span></div>";});
    h+="<div class='exp-msg'>🎯 請優先向顧客推薦這些口味，確保新鮮度！</div></div>";
  }

function adjStk(id,d){G.stks=G.stks.map(function(s){return s.id===id?{id:s.id,pid:s.pid,name:s.name,stock:Math.max(0,s.stock+d)}:s;});saveInv();render();}
function adjMat(id,d){G.mats=G.mats.map(function(m){return m.id===id?{id:m.id,name:m.name,unit:m.unit,stock:Math.max(0,parseFloat((m.stock+d).toFixed(3))),min:m.min}:m;});saveInv();render();}
function togIn(pid){G.inOpen[pid]=!G.inOpen[pid];G.adjOpen[pid]=false;if(!G.inQty[pid])G.inQty[pid]=0;render();}
function cancelIn(pid){G.inOpen[pid]=false;G.inQty[pid]=0;render();}
function chgIn(pid,d){G.inQty[pid]=Math.max(0,(G.inQty[pid]||0)+d);render();}
function doIn(pid,sid){
  var qty=G.inQty[pid]||0;
  var dEl=document.getElementById("inDate_"+pid);
  var prodDate=dEl?dEl.value:"";
  if(qty<=0||!prodDate){alert("請設定進貨罐數和製作日期");return;}
  var pname="";for(var i=0;i<G.prods.length;i++){if(G.prods[i].id===pid){pname=G.prods[i].name;break;}}
  if(!G.batches[pid])G.batches[pid]=[];
  G.batches[pid].push({id:Date.now(),prodDate:prodDate,addedDate:new Date().toISOString().slice(0,10),qty:qty});
  G.stks=G.stks.map(function(s){return s.id===sid?{id:s.id,pid:s.pid,name:s.name,stock:s.stock+qty}:s;});
  G.mvs.push({id:Date.now()+Math.random(),type:"in",pid:pid,name:pname,qty:qty,date:today(),time:nowt(),prodDate:prodDate,note:""});
  G.inOpen[pid]=false;G.inQty[pid]=0;
  saveInv();saveBatch();saveMov();render();
}
function togAdj(pid){G.adjOpen[pid]=!G.adjOpen[pid];G.inOpen[pid]=false;G.adjQty[pid]=0;render();}
function cancelAdj(pid){G.adjOpen[pid]=false;G.adjQty[pid]=0;render();}
function chgAdj(pid,d){G.adjQty[pid]=(G.adjQty[pid]||0)+d;render();}
function doAdj(pid,sid){
  var aq=G.adjQty[pid]||0;
  if(aq===0)return;
  var noteEl=document.getElementById("adjNote_"+pid);
  var note=noteEl?noteEl.value.trim():"";
  if(!note){alert("請填寫調整原因");return;}
  var pname="";for(var i=0;i<G.prods.length;i++){if(G.prods[i].id===pid){pname=G.prods[i].name;break;}}
  G.stks=G.stks.map(function(s){return s.id===sid?{id:s.id,pid:s.pid,name:s.name,stock:Math.max(0,s.stock+aq)}:s;});
  var dir=aq>0?"+":"-";
  G.mvs.push({id:Date.now()+Math.random(),type:"adj",pid:pid,name:pname,qty:Math.abs(aq),adjDir:dir,date:today(),time:nowt(),note:dir+Math.abs(aq)+"罐："+note});

  saveInv();saveMov();render();
}

function rProd(prods){
  var req={};

    var qty=G.plan[pid];if(!qty||qty<=0)return;
    var bom=BOM[pid]||{};
    Object.keys(bom).forEach(function(mid){req[mid]=(req[mid]||0)+bom[mid]*qty;});
  });
  var total=Object.values(G.plan).reduce(function(s,v){return s+(v||0);},0);
  var canP=total>0;
  if(canP){Object.keys(req).forEach(function(mid){var m=null;G.mats.forEach(function(x){if(x.id===parseInt(mid))m=x;});if(!m||m.stock<req[mid])canP=false;});}
  var low=G.mats.filter(function(m){return m.stock<=m.min;});
  var h="<div class='sec'>今日生產計畫（罐）</div><div class='pr-card'>";
  prods.forEach(function(p){h+="<div class='pr-row'><div class='pr-nm'>"+p.name+"</div><input class='pr-in' type='number' min='0' inputmode='numeric' value='"+(G.plan[p.id]||"")+"' placeholder='0' oninput='G.plan["+p.id+"]=parseInt(this.value)||0;render()'></div>";});
  h+="<button class='pb "+(canP?"pb-ok":"pb-no")+"' "+(canP?"":"disabled")+" onclick='doProd()'>"+(total===0?"請輸入生產數量":canP?"✓ 確認生產（共 "+total+" 罐）":"⚠ 材料不足")+"</button></div>";
  h+="<div class='sec'>所需原料試算</div>";
  if(total===0){h+="<div class='hint'>輸入上方數量後自動試算</div>";}
  else{
    h+="<div class='mat-card'>";
    G.mats.forEach(function(m){var need=req[m.id]||0;if(!need)return;var ok=m.stock>=need;h+="<div class='mr'><span class='mr-n'>"+m.name+"</span><span class='"+(ok?"c-ok":"c-er")+"' style='font-weight:700'>需"+need.toFixed(2)+m.unit+"（有"+m.stock+"）"+(ok?" ✓":" ✗")+"</span></div>";});
    h+="</div>";
  }
  h+="<div class='sec' style='margin-top:12px'>原料警示</div>";
  if(low.length===0){h+="<div class='good'>✓ 所有原料庫存充足</div>";}
  else{low.forEach(function(m){h+="<div class='warn'>⚠ <strong>"+m.name+"</strong> 偏低（"+m.stock+m.unit+"，下限"+m.min+m.unit+"）</div>";});}
  return h;
}
function doProd(){
  var req={};
  Object.keys(G.plan).forEach(function(pid){
    var qty=G.plan[pid];if(!qty||qty<=0)return;
    var bom=BOM[pid]||{};
    Object.keys(bom).forEach(function(mid){req[mid]=(req[mid]||0)+bom[mid]*qty;});
  });
  G.mats=G.mats.map(function(m){var n=req[m.id]||0;return {id:m.id,name:m.name,unit:m.unit,stock:parseFloat((m.stock-n).toFixed(3)),min:m.min};});
  G.stks=G.stks.map(function(s){var q=G.plan[s.pid]||0;return {id:s.id,pid:s.pid,name:s.name,stock:s.stock+q};});
  G.plan={};saveInv();render();
}

/* ════ Settings ════ */
function rSet(){
  if(!G.ep)G.ep=clone(G.prods);
  if(!G.em)G.em=clone(G.mats);
  if(!G.es)G.es=clone(G.stks);
  var h="";
  if(G.sok)h+="<div class='save-ok'>✓ 已儲存並同步至所有裝置！</div>";
  h+="<div class='set-tip'>修改完成後請按「儲存並同步」。</div>";
  h+="<div class='set-card'><div class='set-hdr'><span>🛍 商品名稱與售價</span><button class='add-btn' onclick='addProd()'>＋ 新增</button></div>";
  G.ep.forEach(function(p,i){
    h+="<div class='set-row'><div class='set-lbl'>商品名稱</div><input class='set-inp' type='text' value='"+p.name+"' oninput="G.ep["+i+"].name=this.value">";
    h+="<div class='g2'><div><div class='set-lbl' style='margin-top:10px'>售價（NT$）</div><input class='set-inp r' type='number' inputmode='numeric' value='"+p.price+"' oninput="G.ep["+i+"].price=parseInt(this.value)||0"></div>";
    h+="<div><div class='set-lbl' style='margin-top:10px'>是否上架</div><div class='tog-row' style='padding:8px 0;border:none'><span class='tog-lbl'>"+(p.on!==false?"上架中":"已下架")+"</span><label class='tog'><input type='checkbox' "+(p.on!==false?"checked":"")+" onchange="G.ep["+i+"].on=this.checked;render()"><span class='tsl'></span></label></div></div></div>";
    h+="<button class='del-btn' onclick='delProd("+i+")'>✕ 刪除此商品</button></div>";
  });
  h+="</div>";
  h+="<div class='set-card'><div class='set-hdr'><span>📦 成品庫存數量</span></div>";
  G.es.forEach(function(s,i){h+="<div class='set-row'><div class='set-lbl'>"+s.name+"</div><input class='set-inp r' type='number' inputmode='numeric' value='"+s.stock+"' oninput="G.es["+i+"].stock=parseInt(this.value)||0"></div>";});
  h+="</div>";
  h+="<div class='set-card'><div class='set-hdr'><span>🧂 原料庫存與下限</span><button class='add-btn' onclick='addMat()'>＋ 新增</button></div>";
  G.em.forEach(function(m,i){
    h+="<div class='set-row'><div class='set-lbl'>原料名稱</div><input class='set-inp' type='text' value='"+m.name+"' oninput="G.em["+i+"].name=this.value">";
    h+="<div class='g3'><div><div class='set-lbl' style='margin-top:10px'>現有庫存</div><input class='set-inp r' type='number' inputmode='decimal' value='"+m.stock+"' oninput="G.em["+i+"].stock=parseFloat(this.value)||0"></div><div><div class='set-lbl' style='margin-top:10px'>警示下限</div><input class='set-inp r' type='number' inputmode='decimal' value='"+m.min+"' oninput="G.em["+i+"].min=parseFloat(this.value)||0"></div><div><div class='set-lbl' style='margin-top:10px'>單位</div><input class='set-inp c' type='text' value='"+m.unit+"' oninput="G.em["+i+"].unit=this.value"></div></div>";
    h+="<button class='del-btn' onclick='delMat("+i+")'>✕ 刪除此原料</button></div>";
  });
  h+="</div><button class='save-btn' onclick='saveSettings()'>💾 儲存並同步至所有裝置</button>";
  return h;
}
function addProd(){if(!G.ep)G.ep=clone(G.prods);var ni=nid(G.ep);G.ep.push({id:ni,name:"新商品",price:0,on:true});if(!G.es)G.es=clone(G.stks);G.es.push({id:nid(G.es),pid:ni,name:"新商品",stock:0});render();}
function delProd(i){if(!confirm("確定要刪除這個商品嗎？"))return;var pid=G.ep[i].id;G.ep.splice(i,1);if(G.es)G.es=G.es.filter(function(s){return s.pid!==pid;});render();}
function addMat(){if(!G.em)G.em=clone(G.mats);G.em.push({id:nid(G.em),name:"新原料",unit:"kg",stock:0,min:0});render();}
function delMat(i){if(!confirm("確定要刪除這個原料嗎？"))return;G.em.splice(i,1);render();}
function saveSettings(){
  G.es=G.es.map(function(s){var p=null;G.ep.forEach(function(x){if(x.id===s.pid)p=x;});return p?{id:s.id,pid:s.pid,name:p.name,stock:s.stock}:s;});
  G.prods=clone(G.ep);G.mats=clone(G.em);G.stks=clone(G.es);
  G.ep=null;G.em=null;G.es=null;G.sok=true;
  saveProd();saveInv();render();
  setTimeout(function(){G.sok=false;},3000);
}

/* ════ Start ════ */
startListeners();
</script>
