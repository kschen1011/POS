// ── Utils ──
function ymStr(d){return d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,'0')}
function datStr(d){const dt=d instanceof Date?d:new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function today(){return datStr(new Date())}
function daysDiff(s){const a=new Date(s),b=new Date();a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.floor((b-a)/86400000)}
function fmtTime(ts){const d=ts&&ts.toDate?ts.toDate():(ts?new Date(ts):new Date());return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fmtDT(ts){const d=ts&&ts.toDate?ts.toDate():(ts?new Date(ts):new Date());return datStr(d)+' '+fmtTime(ts)}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getStk(pid){return stks[pid]||0}
function getProd(pid){return prods.find(p=>p.id===pid)}
function getMat(mid){return mats.find(m=>m.id===mid)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hasExpBatches(){
  for(const pid in batches){
    const p=getProd(Number(pid));if(!p||p.category!=='snowball')continue;
    if((batches[pid]||[]).some(b=>b.qty>0&&daysDiff(b.date)>=10))return true;
  }return false;
}
function hasExpBatch(pid){
  const p=getProd(pid);if(!p||p.category!=='snowball')return false;
  return(batches[pid]||[]).some(b=>b.qty>0&&daysDiff(b.date)>=10);
}

    if(!prods||prods.length===0){

      setTimeout(async()=>{
        try{const ps=await pos.doc('products').get();if(ps.exists)prods=ps.data().items||[];renderPOS();}
        catch(e){console.error('Retry failed',e);}

// ── Cart ──
function cartQty(pid){return(cart.find(c=>c.pid===pid)||{qty:0}).qty}
function addToCart(pid){
  const p=getProd(pid);if(!p||!p.active)return;
  const stk=getStk(pid);if(stk<=0)return;
  const ex=cart.find(c=>c.pid===pid);
  if(ex){if(ex.qty>=stk)return;ex.qty++;}else cart.push({pid,qty:1,unitPrice:p.price});
  modMode=null;customAmt=null;renderPOS();
}
function removeFromCart(pid){
  const ex=cart.find(c=>c.pid===pid);if(!ex)return;
  if(ex.qty>1)ex.qty--;else cart=cart.filter(c=>c.pid!==pid);
  modMode=null;customAmt=null;renderPOS();
}
function clearCart(){cart=[];modMode=null;customAmt=null;renderPOS();}
function calcTotal(){
  if(customAmt!==null)return customAmt;
  let t=cart.reduce((s,c)=>{const p=getProd(c.pid);return s+(p?p.price*c.qty:0);},0);
  if(modMode==='staff')t-=cart.reduce((s,c)=>{const p=getProd(c.pid);return s+(p&&p.staffDisc?10*c.qty:0);},0);
  else if(modMode==='pr')t=0;
  return Math.max(0,t);
}
function getDisc(){
  if(modMode!=='staff')return 0;
  return cart.reduce((s,c)=>{const p=getProd(c.pid);return s+(p&&p.staffDisc?10*c.qty:0);},0);
}

// ── FIFO ──
function fifoDeduct(pid,qty){
  const bs=(batches[pid]||[]).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let rem=qty;
  for(const b of bs){if(rem<=0)break;const take=Math.min(b.qty,rem);b.qty-=take;rem-=take;}
  batches[pid]=bs.filter(b=>b.qty>0);
  // 修正：無論是否有批次記錄，庫存一律扣減實際售出數量
  // 舊版：stks[pid] - qty + rem → 批次為空時 rem=qty 導致庫存未變
  stks[pid]=Math.max(0,(stks[pid]||0)-qty);
}

// ── Checkout ──
async function checkout(){
  if(!cart.length)return;
  const total=calcTotal(),disc=getDisc(),ym=ymStr(new Date());
  const rec={id:genId(),ts:new Date().toISOString(),items:cart.map(c=>{const p=getProd(c.pid);return{pid:c.pid,name:p.name,qty:c.qty,unitPrice:p.price};}),total,discount:disc,custType};
  for(const c of cart){
    const p=getProd(c.pid);if(!p)continue;
    fifoDeduct(c.pid,c.qty);
    mvs.push({id:genId(),ts:new Date().toISOString(),pid:c.pid,name:p.name,type:'out',qty:c.qty,reason:'POS銷售['+(custType==='walkin'?'現場':'預訂')+']'});
  }
  if(!salesCache[ym])salesCache[ym]=[];
  salesCache[ym].push(rec);
  try{await Promise.all([saveSales(ym),saveInv(),saveBatches(),saveMvs()]);setSyncStatus(true);}
  catch(e){setSyncStatus(false);}
  cart=[];modMode=null;customAmt=null;
  updateAlertBanner();renderPOS();
  alert('✅ 結帳成功！\n金額：NT$'+total.toLocaleString()+(disc>0?'\n折抵：-NT$'+disc:''));
}
async function deleteSale(ym,id){
  if(!confirm('確定刪除這筆交易並還原庫存？'))return;
  const idx=(salesCache[ym]||[]).findIndex(s=>s.id===id);if(idx<0)return;
  const sale=salesCache[ym][idx];
  for(const si of sale.items){
    stks[si.pid]=(stks[si.pid]||0)+si.qty;
    if(!batches[si.pid])batches[si.pid]=[];
    batches[si.pid].push({date:today(),qty:si.qty});
    mvs.push({id:genId(),ts:new Date().toISOString(),pid:si.pid,name:si.name,type:'adjust',qty:si.qty,reason:'刪除銷售還原'});
  }
  salesCache[ym].splice(idx,1);
  await Promise.all([saveSales(ym),saveInv(),saveBatches(),saveMvs()]);
  updateAlertBanner();renderReports();
}

// ── Inventory Ops ──
async function addStock(pid,qty,bDate){
  if(!qty||qty<=0)return;
  const p=getProd(pid);if(!p)return;
  stks[pid]=(stks[pid]||0)+qty;
  if(!batches[pid])batches[pid]=[];
  batches[pid].push({date:bDate||today(),qty});
  mvs.push({id:genId(),ts:new Date().toISOString(),pid,name:p.name,type:'in',qty,reason:'進貨(批次:'+(bDate||today())+')',batchDate:bDate||today()});
  inFormOpen[pid]=false;
  await Promise.all([saveInv(),saveBatches(),saveMvs()]);
  updateAlertBanner();renderInventory();renderPOS();
}
async function adjustStock(pid,qty,reason){
  if(!reason)return;
  const p=getProd(pid);
  stks[pid]=Math.max(0,(stks[pid]||0)+qty);
  mvs.push({id:genId(),ts:new Date().toISOString(),pid,name:p?p.name:'',type:'adjust',qty,reason});
  adjFormOpen[pid]=false;
  await Promise.all([saveInv(),saveMvs()]);
  renderInventory();
}
async function editBatchDate(pid,bi,newDate){
  if(!batches[pid]||!batches[pid][bi])return;
  batches[pid][bi].date=newDate;

  </div>`;
  function pCards(items){
    let g='';

  }
  const sb=prods.filter(p=>p.active&&p.category==='snowball');
  const pk=prods.filter(p=>p.active&&p.category==='packaging');
  if(sb.length)h+=`<div class="cat-lbl">🍪 產品</div><div class="pgrid">${pCards(sb)}</div>`;
  if(pk.length)h+=`<div class="cat-lbl">🛍 包裝類周邊</div><div class="pgrid">${pCards(pk)}</div>`;

    h+=`<div class="card" style="margin-top:12px">
      <div class="fb mb8"><span class="card-title">🛒 購物車</span><button class="btn btn-sm btn-s" onclick="clearCart()">清空</button></div>`;

    h+=`<button class="btn btn-s btn-sm btn-full mt8" onclick="toggleModPanel()">✏️ 改金額</button>`;

        <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--warn)">改金額</div>
        <div class="mod-grid">
          <button class="mbtn ${modMode==='staff'?'on':''}" onclick="setModMode('staff')">👤 員工特約<br><small>-NT$10/罐</small></button>
          <button class="mbtn ${modMode==='pr'?'on':''}" onclick="setModMode('pr')">🎁 公關出貨<br><small>NT$0</small></button>
          <button class="mbtn" onclick="setModMode('restore')">↩️ 恢復原價</button>
          <button class="mbtn ${modMode==='custom'?'on':''}" onclick="setModMode('custom')">✏️ 自訂金額</button>
        </div>
        ${modMode==='staff'&&disc>0?'<div style="font-size:12px;color:var(--ok);margin-bottom:6px">特約折抵：-NT$'+disc+'</div>':''}
        ${modMode==='custom'||customAmt!==null?'<div style="display:flex;gap:6px"><input type="number" id="ca-inp" placeholder="輸入金額" value="'+(customAmt??'')+'" style="flex:1;padding:8px;border:1px solid var(--bdr);border-radius:8px;font-size:14px"><button class="btn btn-p btn-sm" onclick="applyCA()">套用</button></div>':''}

function renderInventory(){
  const el=document.getElementById('inv-body');if(!el)return;
  if(invTab==='goods')renderInvGoods(el);
  else if(invTab==='batches')renderInvBatches(el);
  else renderInvMats(el);
}
function renderInvGoods(el){
  let h='';
  function grp(title,items){
    if(!items.length)return'';
    let g=`<div class="card"><div class="card-title">${title}</div>`;
    for(const p of items){
      const stk=getStk(p.id),low=stk>0&&stk<=5,zero=stk<=0;
      const sf=inFormOpen[p.id],af=adjFormOpen[p.id];
      const bs=(batches[p.id]||[]).filter(b=>b.qty>0).sort((a,b)=>new Date(a.date)-new Date(b.date));
      g+=`<div class="inv-item">
        <div class="ii-nm"><div class="ii-title">${p.active?'':'[下架] '}${esc(p.name)}</div><div class="ii-sub">NT$${p.price}</div></div>
        <div class="ii-stk ${zero?'zero':low?'low':'ok'}">${stk}</div>
        <div class="ii-btns">
          <button class="abtn" onclick="quickAdj(${p.id},-1)">−</button>
          <button class="abtn" onclick="quickAdj(${p.id},1)">+</button>
          <button class="abtn" style="font-size:13px" onclick="toggleInForm(${p.id})">📥</button>
        </div>
      </div>`;
      g+=`<div class="isform ${sf?'show':''}" id="isf-${p.id}">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--p)">📥 入庫 – ${esc(p.name)}</div>
        ${p.category==='snowball'?'<div style="font-size:11px;color:var(--warn);margin-bottom:6px">⚠️ 寄賣歸還請使用實際製作日期</div>':''}
        <div class="fr"><span class="fl">罐數</span>
          <div class="qrow">
            <input type="number" id="iq-${p.id}" min="1" value="1">
            <button class="btn btn-s btn-xs" onclick="adjIQ(${p.id},-5)">-5</button>
            <button class="btn btn-s btn-xs" onclick="adjIQ(${p.id},-1)">-1</button>
            <button class="btn btn-s btn-xs" onclick="adjIQ(${p.id},1)">+1</button>
            <button class="btn btn-s btn-xs" onclick="adjIQ(${p.id},5)">+5</button>
            <button class="btn btn-s btn-xs" onclick="adjIQ(${p.id},10)">+10</button>
          </div>
        </div>
        <div class="fr"><span class="fl">製作日期</span><input type="date" id="id-${p.id}" value="${today()}" max="${today()}"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-p btn-sm" onclick="submitInstock(${p.id})">✅ 確認入庫</button>
          <button class="btn btn-s btn-sm" onclick="toggleInForm(${p.id})">取消</button>
        </div>
      </div>`;
      g+=`<div class="adjform ${af?'show':''}" id="adf-${p.id}">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--warn)">⚖️ 人工調整</div>
        <div class="fr"><span class="fl">調整量</span><input type="number" id="aq-${p.id}" placeholder="±數量" style="width:80px"></div>
        <div class="fr"><span class="fl">原因</span><input type="text" id="ar-${p.id}" placeholder="填寫原因（必填）"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-p btn-sm" onclick="submitAdj(${p.id})">確認</button>
          <button class="btn btn-s btn-sm" onclick="toggleAdjForm(${p.id})">取消</button>
        </div>
      </div>`;
      if(bs.length){
        g+=`<div style="margin-bottom:6px">`;
        bs.forEach((b,i)=>{
          const days=daysDiff(b.date),isRef=p.category==='packaging';
          const cls=isRef?'ref':days>=10?'exp':days>=7?'warn':'ok';
          const isEd=editBatch&&editBatch.pid===p.id&&editBatch.bi===i;
          g+=`<div class="bi ${cls}">
            <span>${b.date} · ${days}天 · ${b.qty}${isRef?'件':'罐'}${isRef?' (參考)':''}</span>
            ${isEd?
              '<span style="display:flex;gap:4px;align-items:center"><input type="date" id="eb-dt" value="'+b.date+'" max="'+today()+'" style="padding:3px;border:1px solid var(--bdr);border-radius:6px;font-size:11px"><button class="btn btn-p btn-xs" onclick="submitEB('+p.id+','+i+')">✅</button><button class="btn btn-s btn-xs" onclick="editBatch=null;renderInventory()">✕</button></span>' :
              '<button class="btn btn-s btn-xs" onclick="editBatch={pid:'+p.id+',bi:'+i+'};renderInventory()">✏️</button>'
            }
          </div>`;
        });
        g+=`</div>`;
      }
      g+=`<button class="btn btn-s btn-xs mb8" onclick="toggleAdjForm(${p.id})">⚖️ 人工調整</button>`;
    }
    return g+`</div>`;
  }
  h+=grp('🍪 產品',prods.filter(p=>p.category==='snowball'));
  const pks=prods.filter(p=>p.category==='packaging');
  if(pks.length)h+=grp('🛍 包裝類周邊',pks);
  else h+=`<div class="card txt-muted" style="text-align:center;padding:16px">包裝類商品可在設定頁新增</div>`;
  el.innerHTML=h;
}
function renderInvBatches(el){
  let h=`<div class="card"><div class="card-title">📦 批次總覽</div>`;
  let all=[];
  for(const pid in batches){
    const p=getProd(Number(pid));if(!p)continue;
    (batches[pid]||[]).filter(b=>b.qty>0).forEach(b=>all.push({p,date:b.date,qty:b.qty,days:daysDiff(b.date)}));
  }
  all.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!all.length){h+=`<div class="empty"><div class="ei">📭</div><div class="et">目前無庫存批次</div></div>`;}
  else{
    const exp=all.filter(b=>b.p.category==='snowball'&&b.days>=10);
    const warn=all.filter(b=>b.p.category==='snowball'&&b.days>=7&&b.days<10);
    const ok=all.filter(b=>b.p.category==='snowball'&&b.days<7);
    const ref=all.filter(b=>b.p.category==='packaging');
    if(exp.length){h+=`<div style="font-size:13px;font-weight:700;color:var(--err);margin-bottom:6px">🔴 需促銷（≥10天）</div>`;exp.forEach(b=>{h+=`<div class="bi exp">${esc(b.p.name)} · ${b.date} · ${b.days}天 · ${b.qty}罐</div>`;});}
    if(warn.length){h+=`<div style="font-size:13px;font-weight:700;color:var(--warn);margin:8px 0 6px">🟡 即將到期（7–9天）</div>`;warn.forEach(b=>{h+=`<div class="bi warn">${esc(b.p.name)} · ${b.date} · ${b.days}天 · ${b.qty}罐</div>`;});}
    if(ok.length){h+=`<div style="font-size:13px;font-weight:700;color:var(--ok);margin:8px 0 6px">🟢 正常（<7天）</div>`;ok.forEach(b=>{h+=`<div class="bi ok">${esc(b.p.name)} · ${b.date} · ${b.days}天 · ${b.qty}罐</div>`;});}
    if(ref.length){h+=`<div style="font-size:13px;font-weight:700;color:var(--blu);margin:8px 0 6px">🔵 包裝類（僅參考）</div>`;ref.forEach(b=>{h+=`<div class="bi ref">${esc(b.p.name)} · ${b.date} · ${b.days}天 · ${b.qty}件</div>`;});}
  }
  h+=`</div>`;el.innerHTML=h;
}
function renderInvMats(el){
  let h=`<div class="card"><div class="card-title">🌾 原料庫存</div>`;
  for(const m of mats){
    const low=m.stock<=m.minStock,zero=m.stock<=0;
    h+=`<div class="inv-item">
      <div class="ii-nm"><div class="ii-title">${esc(m.name)}</div><div class="ii-sub">下限：${m.minStock} ${m.unit}</div></div>
      <div class="ii-stk ${zero?'zero':low?'low':'ok'}">${Number(m.stock.toFixed(2))}</div>
      <div class="ii-btns">
        <button class="abtn" onclick="adjMat(${m.id},-0.1)">−</button>
        <button class="abtn" onclick="adjMat(${m.id},0.1)">+</button>
      </div>
    </div>`;
  }
  h+=`</div>`;el.innerHTML=h;
}
function toggleInForm(pid){inFormOpen[pid]=!inFormOpen[pid];renderInventory();}
function toggleAdjForm(pid){adjFormOpen[pid]=!adjFormOpen[pid];renderInventory();}
function adjIQ(pid,d){const e=document.getElementById('iq-'+pid);if(e)e.value=Math.max(1,(parseInt(e.value)||1)+d);}
function submitInstock(pid){const q=parseInt(document.getElementById('iq-'+pid)?.value)||0,dt=document.getElementById('id-'+pid)?.value||today();if(!q){alert('請輸入數量');return;}addStock(pid,q,dt);}
function submitAdj(pid){const q=parseInt(document.getElementById('aq-'+pid)?.value)||0,r=(document.getElementById('ar-'+pid)?.value||'').trim();if(!q){alert('請輸入調整量');return;}if(!r){alert('請填寫原因');return;}adjustStock(pid,q,r);}
function submitEB(pid,bi){const nd=document.getElementById('eb-dt')?.value;if(nd)editBatchDate(pid,bi,nd);}
async function quickAdj(pid,d){
  stks[pid]=Math.max(0,(stks[pid]||0)+d);
  // 若是增加庫存，補建批次記錄（保持 FIFO 資料一致）
  if(d>0){
    if(!batches[pid])batches[pid]=[];
    batches[pid].push({date:today(),qty:d});
    await Promise.all([saveInv(),saveBatches()]);
  } else {
    await saveInv();
  }
  renderInventory();renderPOS();
}
async function adjMat(mid,d){const m=getMat(mid);if(m)m.stock=Math.max(0,parseFloat((m.stock+d).toFixed(3)));await saveInv();renderInventory();}

// ── RENDER: REPORTS ──
function renderReports(){
  const el=document.getElementById('rep-body');if(!el)return;
  if(repTab==='today')renderRepToday(el);
  else if(repTab==='month')renderRepMonth(el);
  else if(repTab==='year')renderRepYear(el);
  else renderRepMv(el);
}
function getTodaySales(){
  return getDaySales(repDate);
}
async function loadDateSales(dateStr){
  const ym=dateStr.slice(0,4)+dateStr.slice(5,7);
  if(!salesCache[ym]) await loadSalesMonth(ym);
}
function getDaySales(dateStr){
  const ym=dateStr.slice(0,4)+dateStr.slice(5,7);
  return(salesCache[ym]||[]).filter(s=>datStr(new Date(s.ts))===dateStr);
}
function flavorChart(ss,title){
  const fm={};
  ss.forEach(s=>s.items.forEach(i=>{const p=getProd(i.pid)||{name:i.name||'未知'};fm[p.name]=(fm[p.name]||0)+i.qty;}));
  const sorted=Object.entries(fm).sort((a,b)=>b[1]-a[1]);
  let h=`<div class="card"><div class="card-title">${title}</div>`;
  if(!sorted.length)return h+`<div class="txt-muted">尚無銷售記錄</div></div>`;
  const mx=sorted[0][1];
  h+=`<div class="barchart">`;
  sorted.forEach(([nm,qty],i)=>{
    const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    h+=`<div class="brow"><div class="blbl">${med}${esc(nm)}</div><div class="btrack"><div class="bfill" style="width:${(qty/mx*100).toFixed(0)}%"></div></div><div class="bval">${qty}</div></div>`;
  });
  return h+`</div></div>`;
}
function renderRepToday(el){
  const isToday=repDate===today();
  const ss=getDaySales(repDate);
  const total=ss.reduce((s,r)=>s+r.total,0),disc=ss.reduce((s,r)=>s+(r.discount||0),0);
  const tq=ss.reduce((s,r)=>s+r.items.reduce((q,i)=>q+i.qty,0),0);
  const wA=ss.filter(s=>!s.custType||s.custType==='walkin').reduce((s,r)=>s+r.total,0);
  const oA=ss.filter(s=>s.custType==='online').reduce((s,r)=>s+r.total,0);
  const wC=ss.filter(s=>!s.custType||s.custType==='walkin').length;
  const oC=ss.filter(s=>s.custType==='online').length;
  // prev/next day helpers
  const d=new Date(repDate+'T00:00:00');
  const prev=datStr(new Date(d.getTime()-86400000));
  const next=datStr(new Date(d.getTime()+86400000));
  const nextDisabled=repDate>=today();
  let h=`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button class="btn btn-s btn-sm" onclick="changeRepDate('${prev}')">◀</button>
    <input type="date" id="rep-date-inp" value="${repDate}" max="${today()}"
      style="flex:1;padding:8px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-weight:700;text-align:center;background:#fff"
      onchange="changeRepDate(this.value)">
    <button class="btn btn-s btn-sm" onclick="changeRepDate('${next}')" ${nextDisabled?'disabled':''}>▶</button>
    ${isToday?'<span style="background:var(--p);color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">今日</span>':''}
  </div>`;
  // Flavor detail table (per product sold qty)
  const fm={};
  ss.forEach(s=>s.items.forEach(i=>{const p=getProd(i.pid)||{name:i.name||'未知'};fm[p.name]=(fm[p.name]||0)+i.qty;}));
  const sortedFm=Object.entries(fm).sort((a,b)=>b[1]-a[1]);
  h+=`<div class="statrow">
    <div class="statcard"><div class="sv">NT$${total.toLocaleString()}</div><div class="sl">當日營業額</div></div>
    <div class="statcard"><div class="sv">${ss.length}</div><div class="sl">交易筆數</div></div>
    <div class="statcard blue"><div class="sv">${tq}</div><div class="sl">銷售件數</div></div>
    <div class="statcard green"><div class="sv">NT$${disc.toLocaleString()}</div><div class="sl">折扣折抵</div></div>
  </div>
  <div class="card"><div class="card-title">來客類型分析</div>
    <div class="ct-info-bar">
      <div class="ct-info wlk"><div class="civ">NT$${wA.toLocaleString()}</div><div class="cil">🏪 現場 · ${wC}筆</div></div>
      <div class="ct-info onl"><div class="civ">NT$${oA.toLocaleString()}</div><div class="cil">📱 預訂 · ${oC}筆</div></div>
    </div>
  </div>`;
  // Flavor bar chart + quantity table
  h+=`<div class="card"><div class="card-title">🍪 各口味銷售數量</div>`;
  if(!sortedFm.length){h+=`<div class="txt-muted">當日尚無銷售記錄</div>`;}
  else{
    const mx=sortedFm[0][1];
    h+=`<div class="barchart" style="margin-bottom:10px">`;
    sortedFm.forEach(([nm,qty],i)=>{
      const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      h+=`<div class="brow"><div class="blbl">${med}${esc(nm)}</div><div class="btrack"><div class="bfill" style="width:${(qty/mx*100).toFixed(0)}%"></div></div><div class="bval">${qty}</div></div>`;
    });
    h+=`</div>`;
    // Detail table with revenue
    h+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="border-bottom:2px solid var(--bdr)">
        <th style="text-align:left;padding:5px 4px;color:var(--muted);font-weight:600">品項</th>
        <th style="text-align:center;padding:5px 4px;color:var(--muted);font-weight:600">數量</th>
        <th style="text-align:right;padding:5px 4px;color:var(--muted);font-weight:600">營業額</th>
      </tr>`;
    sortedFm.forEach(([nm,qty])=>{
      const rev=ss.reduce((s,r)=>{const si=r.items.find(i=>(getProd(i.pid)||{name:i.name}).name===nm);return s+(si?si.qty*si.unitPrice:0);},0);
      h+=`<tr style="border-bottom:1px solid var(--bdr)">
        <td style="padding:6px 4px">${esc(nm)}</td>
        <td style="text-align:center;padding:6px 4px;font-weight:700">${qty}</td>
        <td style="text-align:right;padding:6px 4px;color:var(--p);font-weight:700">NT$${rev.toLocaleString()}</td>
      </tr>`;
    });
    h+=`<tr style="font-weight:800;border-top:2px solid var(--bdr)">
      <td style="padding:7px 4px">合計</td>
      <td style="text-align:center;padding:7px 4px">${tq}</td>
      <td style="text-align:right;padding:7px 4px;color:var(--p)">NT$${total.toLocaleString()}</td>
    </tr></table>`;
  }
  h+=`</div>`;
  // Transaction list
  const ym=repDate.slice(0,4)+repDate.slice(5,7);
  h+=`<div class="card"><div class="fb mb8"><span class="card-title">交易記錄</span>`;
  if(isToday) h+=`<button class="btn btn-d btn-xs" onclick="clearToday()">清空今日</button>`;
  h+=`</div>`;
  if(!ss.length)h+=`<div class="txt-muted">當日尚無交易記錄</div>`;
  else{
    [...ss].reverse().forEach(s=>{
      const ct=s.custType==='online'?'online':'walkin';
      h+=`<div class="sli">
        <div class="sli-l">
          <div class="sli-time">${fmtTime(s.ts)}</div>
          <div class="sli-items">${s.items.map(i=>esc(i.name)+'×'+i.qty).join(', ')}</div>
          <div class="ct-tag ct-${ct}">${ct==='walkin'?'🏪 現場':'📱 預訂'}</div>
        </div>
        <div class="sli-r">
          <div class="sli-total">NT$${s.total.toLocaleString()}</div>
          ${s.discount>0?'<div style="font-size:10px;color:var(--muted)">折抵-'+s.discount+'</div>':''}
          <button class="del-btn" onclick="deleteSale('${ym}','${s.id}')">🗑</button>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;
  el.innerHTML=h;
}
async function changeRepDate(d){
  if(!d||d>today()) return;
  repDate=d;
  const ym=d.slice(0,4)+d.slice(5,7);
  if(!salesCache[ym]) await loadSalesMonth(ym);
  renderReports();
}
async function clearToday(){
  if(!confirm('確定清空今日（'+repDate+'）的交易？此操作不還原庫存。'))return;
  const ym=repDate.slice(0,4)+repDate.slice(5,7);
  if(salesCache[ym])salesCache[ym]=salesCache[ym].filter(s=>datStr(new Date(s.ts))!==repDate);
  await saveSales(ym);renderReports();
}
async function renderRepMonth(el){

  const oC=ss.filter(s=>s.custType==='online').length;

    <div class="statcard blue"><div class="sv">${tq}</div><div class="sl">銷售件數</div></div>
    <div class="statcard green"><div class="sv">NT$${disc.toLocaleString()}</div><div class="sl">折扣折抵</div></div>
  </div>
  <div class="card"><div class="card-title">來客類型分析</div>
    <div class="ct-info-bar">
      <div class="ct-info wlk"><div class="civ">NT$${wA.toLocaleString()}</div><div class="cil">🏪 現場 · ${wC}筆</div></div>
      <div class="ct-info onl"><div class="civ">NT$${oA.toLocaleString()}</div><div class="cil">📱 預訂 · ${oC}筆</div></div>

  const sorted=Object.entries(fm).sort((a,b)=>b[1]-a[1]);

      h+=`<div class="fb" style="padding:4px 0;border-bottom:1px solid var(--bdr);font-size:12px"><span>${esc(nm)}</span><span style="color:var(--muted)">${qty}罐 · NT$${rev.toLocaleString()}</span></div>`;

  h+=`</div>`;el.innerHTML=h;
}
async function changeRepMonth(d){
  let y=parseInt(repMonth.slice(0,4)),m=parseInt(repMonth.slice(4));m+=d;
  if(m>12){m=1;y++;}if(m<1){m=12;y--;}
  repMonth=y.toString()+String(m).padStart(2,'0');
  await renderRepMonth(document.getElementById('rep-body'));
}
async function renderRepYear(el){
  const rb=document.getElementById('rep-body');
  if(rb)rb.innerHTML=`<div style="text-align:center;padding:30px;color:var(--muted)">載入年度資料中…</div>`;
  const all=[];
  for(let m=1;m<=12;m++){const ym=repYear.toString()+String(m).padStart(2,'0');if(!salesCache[ym])await loadSalesMonth(ym);all.push(...(salesCache[ym]||[]));}
  const total=all.reduce((s,r)=>s+r.total,0),tq=all.reduce((s,r)=>s+r.items.reduce((q,i)=>q+i.qty,0),0);
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <button class="btn btn-s btn-sm" onclick="changeRepYear(-1)">◀</button>
    <span style="font-size:15px;font-weight:700;flex:1;text-align:center">${repYear}年度</span>
    <button class="btn btn-s btn-sm" onclick="changeRepYear(1)">▶</button>
  </div>
  <div class="statrow">
    <div class="statcard"><div class="sv">NT$${total.toLocaleString()}</div><div class="sl">年度營業額</div></div>
    <div class="statcard"><div class="sv">${tq}</div><div class="sl">年度銷售量</div></div>
  </div>`;
  const fm={};
  all.forEach(s=>s.items.forEach(i=>{const p=getProd(i.pid)||{name:i.name||'未知'};fm[p.name]=(fm[p.name]||0)+i.qty;}));
  const sorted=Object.entries(fm).sort((a,b)=>b[1]-a[1]);
  h+=`<div class="card"><div class="card-title">🏆 年度排行榜</div>`;
  if(!sorted.length)h+=`<div class="txt-muted">本年度尚無銷售記錄</div>`;
  else sorted.forEach(([nm,qty],i)=>{
    const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const rev=all.reduce((s,r)=>{const si=r.items.find(it=>(getProd(it.pid)||{name:it.name}).name===nm);return s+(si?si.qty*si.unitPrice:0);},0);
    h+=`<div class="fb" style="padding:8px 0;border-bottom:1px solid var(--bdr)">
      <span style="font-size:14px">${med} ${esc(nm)}</span>
      <span style="color:var(--muted);font-size:13px">${qty}罐 · NT$${rev.toLocaleString()}</span>
    </div>`;
  });
  h+=`</div>`;if(el)el.innerHTML=h;
}
function changeRepYear(d){repYear+=d;renderRepYear(document.getElementById('rep-body'));}
function renderRepMv(el){
  const fil=mvTab==='all'?[...mvs].reverse():[...mvs].reverse().filter(m=>m.type===mvTab);
  const inT=mvs.filter(m=>m.type==='in').reduce((s,m)=>s+m.qty,0);
  const outT=mvs.filter(m=>m.type==='out').reduce((s,m)=>s+m.qty,0);
  const adjC=mvs.filter(m=>m.type==='adjust').length;
  let h=`<div class="card">
    <div class="fb mb8"><span class="card-title">進出庫記錄</span></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${['all','in','out','adjust'].map(t=>`<button class="btn ${mvTab===t?'btn-p':'btn-s'} btn-xs" onclick="setMvTab('${t}')">${t==='all'?'全部':t==='in'?'📥 進庫':t==='out'?'📤 出庫':'⚖️ 人工'}</button>`).join('')}
    </div>
    <button class="btn btn-p btn-sm btn-full mb8" onclick="toggleMvIn()">📥 快速進庫</button>
    <div id="mv-in-form" class="isform ${mvInOpen?'show':''}">
      <div class="fr"><span class="fl">品項</span>
        <select id="mv-pid" style="flex:1;padding:7px;border:1px solid var(--bdr);border-radius:8px;font-size:13px">
          ${prods.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="fr"><span class="fl">罐數</span><input type="number" id="mv-qty" min="1" value="1" style="width:80px"></div>
      <div class="fr"><span class="fl">製作日期</span><input type="date" id="mv-dt" value="${today()}"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-p btn-sm" onclick="submitMvIn()">✅ 確認入庫</button>
        <button class="btn btn-s btn-sm" onclick="toggleMvIn()">取消</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
      <div class="statcard"><div class="sv" style="font-size:16px">${inT}</div><div class="sl">進庫合計</div></div>
      <div class="statcard"><div class="sv" style="font-size:16px;color:var(--err)">${outT}</div><div class="sl">出庫合計</div></div>
      <div class="statcard"><div class="sv" style="font-size:16px;color:var(--warn)">${adjC}</div><div class="sl">人工調整</div></div>
    </div>`;
  if(!fil.length)h+=`<div class="txt-muted">暫無記錄</div>`;
  else fil.slice(0,100).forEach(m=>{
    const tc=m.type==='in'?'var(--ok)':m.type==='out'?'var(--err)':'var(--warn)';
    const tl=m.type==='in'?'📥 進庫':m.type==='out'?'📤 出庫':'⚖️ 人工調整';
    h+=`<div class="sli">
      <div class="sli-l">
        <div style="color:${tc};font-size:12px;font-weight:700">${tl}</div>
        <div class="sli-items">${esc(m.name||'')}</div>
        <div class="sli-time">${m.ts?fmtDT(m.ts):''}</div>
      </div>
      <div class="sli-r">
        <div style="font-size:15px;font-weight:700;color:${tc}">${m.type==='out'?'-':''}${m.qty}</div>
        <div style="font-size:10px;color:var(--muted)">${esc(m.reason||'')}</div>
      </div>
    </div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function setMvTab(t){mvTab=t;renderReports();}
function toggleMvIn(){mvInOpen=!mvInOpen;renderReports();}
function submitMvIn(){
  const pid=parseInt(document.getElementById('mv-pid')?.value)||0;
  const qty=parseInt(document.getElementById('mv-qty')?.value)||0;
  const dt=document.getElementById('mv-dt')?.value||today();
  if(!pid||qty<=0){alert('請填寫品項與數量');return;}
  addStock(pid,qty,dt);mvInOpen=false;setTab('inv');
}
function exportCSV(ym){
  const ss=salesCache[ym]||[];
  let csv='\uFEFF日期,時間,品項,數量,單價,金額,來客類型,折扣\n';
  ss.forEach(s=>{
    const dt=new Date(s.ts);
    s.items.forEach(i=>{csv+=datStr(dt)+','+fmtTime(s.ts)+','+i.name+','+i.qty+','+i.unitPrice+','+(i.qty*i.unitPrice)+','+(s.custType==='online'?'預訂':'現場')+','+(s.discount||0)+'\n';});
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='半吊子廚房_'+ym+'.csv';a.click();
}


// ── RENDER: SETTINGS ──
function renderSettings(){
  const el=document.getElementById('set-body');if(!el)return;
  if(setTab_==='prods')renderSetProds(el);
  else if(setTab_==='stk')renderSetStk(el);
  else renderSetMat(el);
}
function renderSetProds(el){
  let h='';
  function grp(title,items,cat){
    let g=`<div class="card"><div class="card-title">${title}</div>`;
    items.forEach(p=>{
      g+=`<div class="set-item">
        <div class="si-l">
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span class="si-cat ${p.category==='snowball'?'sw':'pk'}">${p.category==='snowball'?'🍪':'🛍'}</span>
            <input type="text" value="${esc(p.name)}" style="border:none;background:transparent;font-size:14px;font-weight:700;padding:0;min-width:0;flex:1"
              onblur="updPN(${p.id},this.value)" onchange="updPN(${p.id},this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--muted)">NT$</span>
            <input type="number" value="${p.price}" style="border:1px solid var(--bdr);border-radius:6px;padding:4px 6px;width:70px;font-size:13px"
              onblur="updPP(${p.id},parseInt(this.value))" onchange="updPP(${p.id},parseInt(this.value))">
            ${p.category==='snowball'?`
              <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
                <div class="chk ${p.staffDisc?'on':''}" onclick="toggleSD(${p.id})">${p.staffDisc?'✓':''}</div>特約折扣
              </label>`:''
            }
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div class="toggle ${p.active?'on':''}" onclick="toggleActive(${p.id})" title="${p.active?'上架':'下架'}"></div>
          <button class="btn btn-d btn-xs" onclick="delProd(${p.id})">🗑</button>
        </div>
      </div>`;
    });
    const show=addFormOpen===cat;
    g+=`<div class="add-form ${show?'show':''}">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">新增${cat==='snowball'?'雪球/禮盒':'包裝類'}商品</div>
      <input type="text" id="nf-nm-${cat}" placeholder="商品名稱">
      <input type="number" id="nf-pr-${cat}" placeholder="售價 NT$">
      ${cat==='snowball'?'<label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:10px;cursor:pointer"><input type="checkbox" id="nf-sd-'+cat+'"> 適用特約折扣</label>':'<div style="margin-bottom:8px"></div>'}
      <div style="display:flex;gap:8px">
        <button class="btn btn-p btn-sm" onclick="doAddProd('${cat}')">✅ 新增</button>
        <button class="btn btn-s btn-sm" onclick="addFormOpen=null;renderSettings()">取消</button>
      </div>
    </div>`;
    g+=`<button class="btn btn-s btn-sm btn-full mt8" onclick="addFormOpen=addFormOpen==='${cat}'?null:'${cat}';renderSettings()">+ 新增${cat==='snowball'?'產品（雪球/禮盒）':'包裝類周邊'}</button>`;
    return g+`</div>`;
  }
  h+=grp('🍪 產品',prods.filter(p=>p.category==='snowball'),'snowball');
  h+=grp('🛍 包裝類周邊',prods.filter(p=>p.category==='packaging'),'packaging');
  h+=`<button class="btn btn-p btn-full" onclick="saveAllProds()">💾 儲存商品設定</button>`;
  el.innerHTML=h;
}
function renderSetStk(el){
  let h=`<div class="card"><div class="card-title">📦 成品庫存（直接修改）</div>`;
  prods.forEach(p=>{
    h+=`<div class="set-item">
      <div class="si-l"><div class="si-title">${esc(p.name)}</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" min="0" value="${getStk(p.id)}" id="ss-${p.id}"
          style="width:65px;padding:6px;border:1px solid var(--bdr);border-radius:8px;font-size:14px;text-align:center"
          onchange="stks[${p.id}]=Math.max(0,parseInt(this.value)||0)">
      </div>
    </div>`;
  });
  h+=`<button class="btn btn-p btn-full mt8" onclick="saveStk()">💾 儲存庫存</button></div>`;
  el.innerHTML=h;
}
function renderSetMat(el){
  let h=`<div class="card"><div class="card-title">🌾 原料庫存設定</div>`;
  mats.forEach(m=>{
    h+=`<div class="set-item" style="flex-wrap:wrap;gap:6px">
      <div class="si-l"><div class="si-title">${esc(m.name)}</div><div class="si-sub">${m.unit}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <span style="font-size:10px;color:var(--muted)">庫存</span>
          <input type="number" min="0" step="0.01" value="${m.stock}" id="ms-${m.id}"
            style="width:70px;padding:5px;border:1px solid var(--bdr);border-radius:7px;font-size:13px;text-align:center"
            onchange="getMat(${m.id}).stock=Math.max(0,parseFloat(this.value)||0)">
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <span style="font-size:10px;color:var(--muted)">下限</span>
          <input type="number" min="0" step="0.01" value="${m.minStock}"
            style="width:70px;padding:5px;border:1px solid var(--bdr);border-radius:7px;font-size:13px;text-align:center"
            onchange="getMat(${m.id}).minStock=Math.max(0,parseFloat(this.value)||0)">
        </div>
      </div>
    </div>`;
  });
  h+=`<div style="border-top:1px solid var(--bdr);padding-top:12px;margin-top:4px">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">新增原料</div>
    <div class="fr"><span class="fl">名稱</span><input type="text" id="nm-nm" placeholder="原料名稱"></div>
    <div class="fr"><span class="fl">庫存(kg)</span><input type="number" id="nm-st" min="0" step="0.1" placeholder="0" style="width:80px"></div>
    <div class="fr"><span class="fl">下限(kg)</span><input type="number" id="nm-mn" min="0" step="0.01" placeholder="0" style="width:80px"></div>
    <button class="btn btn-s btn-sm mb8" onclick="doAddMat()">+ 新增原料</button>
  </div>
  <button class="btn btn-p btn-full" onclick="saveMats()">💾 儲存原料設定</button></div>`;
  el.innerHTML=h;
}

// Settings helpers
function updPN(pid,v){const p=getProd(pid);if(p&&v.trim())p.name=v.trim();}
function updPP(pid,v){const p=getProd(pid);if(p&&v>0)p.price=v;}
function toggleSD(pid){const p=getProd(pid);if(p)p.staffDisc=!p.staffDisc;renderSettings();}
async function toggleActive(pid){const p=getProd(pid);if(p)p.active=!p.active;await saveProds();renderSettings();renderPOS();}
async function delProd(pid){
  if(!confirm('確定刪除此商品？'))return;
  prods=prods.filter(p=>p.id!==pid);await saveProds();renderSettings();
}
async function saveAllProds(){await saveProds();alert('✅ 商品設定已儲存');renderPOS();}
async function doAddProd(cat){
  const nm=(document.getElementById('nf-nm-'+cat)?.value||'').trim();
  const pr=parseInt(document.getElementById('nf-pr-'+cat)?.value)||0;
  const sd=document.getElementById('nf-sd-'+cat)?.checked??false;
  if(!nm||pr<=0){alert('請填寫商品名稱與售價');return;}
  const maxId=prods.reduce((m,p)=>Math.max(m,p.id),0);
  const np={id:maxId+1,name:nm,category:cat,price:pr,staffDisc:cat==='snowball'?sd:false,active:true};
  prods.push(np);stks[np.id]=0;
  addFormOpen=null;await Promise.all([saveProds(),saveInv()]);renderSettings();
}
async function saveStk(){await saveInv();alert('✅ 庫存已儲存');renderPOS();}
async function saveMats(){await saveInv();alert('✅ 原料設定已儲存');}
async function doAddMat(){
  const nm=(document.getElementById('nm-nm')?.value||'').trim();
  const st=parseFloat(document.getElementById('nm-st')?.value)||0;
  const mn=parseFloat(document.getElementById('nm-mn')?.value)||0;
  if(!nm){alert('請填寫原料名稱');return;}
  const maxId=mats.reduce((m,mt)=>Math.max(m,mt.id),0);
  mats.push({id:maxId+1,name:nm,unit:'kg',stock:st,minStock:mn});
  await saveInv();renderSettings();
}

// ── INIT ──
async function init(){
  try{
    await checkMigration();
    await loadAll();
    updateAlertBanner();
    renderPOS();
  }catch(e){console.error('init',e);setSyncStatus(false);}
  setTimeout(()=>{
    const ld=document.getElementById('ld');
    if(ld){ld.classList.add('hide');setTimeout(()=>{ld.style.display='none';},450);}
  },900);

  // ── 自動同步機制 ──
  // 1. 每分鐘更新「X分鐘前同步」標籤
  setInterval(updateSyncLabel, 60000);
  // 2. 每 8 分鐘主動重新拉取資料（防止多裝置資料不一致）
  setInterval(()=>refreshIfStale(), 60000);
  // 3. 切回頁面時立即檢查是否過期
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden) refreshIfStale();
  });
  // 4. 每次切換 tab 時順帶刷新
  const origSetTab=setTab;
}
init();
</script>
