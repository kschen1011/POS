<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>半吊子廚房 POS</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBF6F0;
  --surface: #FFFFFF;
  --brown: #2C1A0E;
  --brown2: #5C3D2E;
  --orange: #E8651A;
  --orange2: #FF8C42;
  --gold: #C9952A;
  --green: #3D8B37;
  --red: #D32F2F;
  --red2: #FF5252;
  --text: #2C1A0E;
  --muted: #9E8270;
  --border: #EAD9C8;
  --nav-h: 56px;
  --header-h: 54px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--header-h);background:var(--brown);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#hdr h1{color:#fff;font-size:15px;font-weight:900;letter-spacing:.5px;flex:1}
#exp-badge{display:none;background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--nav-h);background:var(--brown);display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.2)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.45);font-size:10px;gap:3px;font-family:inherit;transition:color .15s}
.nb svg{width:22px;height:22px}
.nb.active{color:var(--orange2)}
.nb.active .ni{background:rgba(232,101,26,.15);border-radius:8px}

/* MAIN */
#app{margin-top:var(--header-h);margin-bottom:var(--nav-h);min-height:calc(100vh - var(--header-h) - var(--nav-h))}
.page{display:none}.page.on{display:block}

/* CARD */
.card{background:var(--surface);border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(44,26,14,.08);margin-bottom:11px}
.ctitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .12s;touch-action:manipulation}
.btn-pri{background:var(--orange);color:#fff;padding:11px 18px;font-size:15px;border-radius:10px;width:100%}
.btn-pri:active{background:var(--brown)}
.btn-pri:disabled{opacity:.45;pointer-events:none}
.btn-sm{padding:5px 11px;font-size:12px;background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-sm:active{background:var(--border)}
.btn-danger{background:#FFEBEE;color:var(--red);padding:7px 12px;font-size:12px;border:1px solid #FFCDD2}
.btn-success{background:#E8F5E9;color:var(--green);padding:7px 12px;font-size:12px;border:1px solid #C8E6C9}

/* SUB TABS */
.stabs{display:flex;gap:6px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;font-family:inherit}
.stab.on{background:var(--brown);color:#fff;border-color:var(--brown)}

/* =================== POS =================== */
#pos-page{padding:11px;padding-bottom:210px}
#exp-banner{display:none;background:linear-gradient(135deg,#C62828,#E53935);color:#fff;border-radius:10px;padding:11px 14px;margin-bottom:11px;font-size:12px;line-height:1.7;font-weight:500}
#prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.pc{background:var(--surface);border-radius:11px;padding:10px 8px;box-shadow:0 2px 8px rgba(44,26,14,.09);position:relative;cursor:pointer;transition:transform .1s;border:2px solid transparent;text-align:center;user-select:none}
.pc:active{transform:scale(.95)}
.pc.ic{border-color:var(--orange)}
.pc.so{opacity:.38;pointer-events:none}
.pc-name{font-size:11.5px;font-weight:700;line-height:1.35;margin-bottom:4px;color:var(--brown)}
.pc-price{font-size:13px;font-weight:700;color:var(--orange)}
.pc-stk{font-size:10.5px;color:var(--muted);margin-top:2px}
.pc-stk.low{color:#E65100;font-weight:600}
.cb{position:absolute;top:-7px;right:-7px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.et{position:absolute;top:-7px;left:-7px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px}

/* CART */
#cart{position:fixed;bottom:var(--nav-h);left:0;right:0;z-index:100;background:var(--surface);box-shadow:0 -4px 20px rgba(44,26,14,.14);border-radius:16px 16px 0 0;max-height:55vh;overflow-y:auto}
#cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
#cart-tog{font-size:13px;font-weight:700;color:var(--brown);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:inherit}
#c-cnt{background:var(--orange);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px}
#c-total{font-size:19px;font-weight:900;color:var(--orange)}
#cart-body{padding:6px 15px}
.ci{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none}
.ci-name{flex:1;font-size:13px;font-weight:500}
.qc{display:flex;align-items:center;gap:7px}
.qb{width:30px;height:30px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--brown)}
.qv{font-size:14px;font-weight:700;min-width:22px;text-align:center}
.ci-sub{font-size:13px;font-weight:700;min-width:55px;text-align:right}
#cart-foot{padding:10px 15px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surface);position:sticky;bottom:0}
#btn-amt{background:var(--bg);border:1.5px solid var(--border);color:var(--brown);padding:10px 13px;font-size:13px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}

/* AMOUNT PANEL */
#amt-panel{display:none;padding:11px 15px;background:#FDF5ED;border-top:1px solid var(--border)}
.qrow{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.qk{flex:1;padding:9px 6px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;min-width:78px;line-height:1.4}
.qk-s{background:#E3F2FD;color:#1565C0}
.qk-p{background:#FCE4EC;color:#B71C1C}
.qk-r{background:#E8F5E9;color:#1B5E20}
.ai-row{display:flex;gap:8px;align-items:center}
.ai-row input{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
.a-info{font-size:12px;color:var(--muted);margin-top:7px}
.a-save{color:var(--green);font-weight:700}

/* =================== INVENTORY =================== */
#inv-page{padding:11px}
.ii{background:var(--surface);border-radius:11px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(44,26,14,.08)}
.ii-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ii-name{font-size:14px;font-weight:700}
.iqc{display:flex;align-items:center;gap:8px}
.iqb{width:31px;height:31px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
.iqv{font-size:19px;font-weight:900;min-width:42px;text-align:center;padding:4px 8px;border-radius:7px}
.qg{background:#E8F5E9;color:#2E7D32}.qo{background:#FFF3E0;color:#E65100}.qr{background:#FFEBEE;color:#C62828}
.ii-acts{display:flex;gap:6px;margin-bottom:7px}
.brow{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;font-size:12px;background:var(--bg);margin-bottom:4px}
.brow.exp{background:#FFEBEE}
.bdys{color:var(--muted)}
.iform{background:#FDF5ED;border-radius:8px;padding:11px;margin-top:8px;border:1px solid var(--border)}
.frow{display:flex;gap:7px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.flabel{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.iform input[type=date],.iform input[type=text],.iform input[type=number]{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;min-width:120px}
.mi{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border-radius:9px;margin-bottom:6px;box-shadow:0 2px 6px rgba(44,26,14,.07)}
.mn{font-size:13px;font-weight:600;flex:1}
.mq{font-size:14px;font-weight:700}.mlow{color:var(--red)}
.mu{font-size:11px;color:var(--muted);margin-left:2px}
.mc{display:flex;align-items:center;gap:6px}
.mb{width:29px;height:29px;border-radius:7px;background:var(--bg);border:1.5px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* =================== REPORTS =================== */
#report-page{padding:11px}
.sc{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.scard{background:var(--surface);border-radius:11px;padding:10px 7px;box-shadow:0 2px 8px rgba(44,26,14,.08);text-align:center}
.sv{font-size:16px;font-weight:900;color:var(--orange);line-height:1.2}
.sl{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.brow2{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.blabel{font-size:11px;width:82px;text-align:right;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;background:var(--bg);border-radius:5px;height:21px;overflow:hidden}
.bfill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));border-radius:5px;display:flex;align-items:center;padding:0 7px;transition:width .5s ease;min-width:36px}
.bval{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bmed{font-size:14px;margin-left:4px}
table.st{width:100%;border-collapse:collapse;font-size:12px}
table.st th{background:var(--bg);padding:7px 6px;text-align:left;font-weight:700;font-size:10.5px;color:var(--muted)}
table.st td{padding:7px 6px;border-bottom:1px solid var(--border)}
.txrow{display:flex;justify-content:space-between;align-items:flex-start;padding:10px;background:var(--surface);border-radius:9px;margin-bottom:7px;box-shadow:0 2px 7px rgba(44,26,14,.08)}
.tx-t{font-size:11px;color:var(--muted)}
.tx-i{font-size:12px;font-weight:500;margin-top:2px;line-height:1.5}
.tx-a{font-size:17px;font-weight:900;color:var(--orange)}
.mvrow{display:flex;align-items:center;gap:9px;padding:10px;background:var(--surface);border-radius:9px;margin-bottom:7px;box-shadow:0 2px 7px rgba(44,26,14,.08)}
.mvtag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap}
.tg-in{background:#E8F5E9;color:#2E7D32}.tg-out{background:#FFEBEE;color:#C62828}.tg-adj{background:#FFF3E0;color:#E65100}
.mvi{flex:1}.mvn{font-size:13px;font-weight:600}.mvd{font-size:11px;color:var(--muted);margin-top:1px}
.mvq{font-size:15px;font-weight:900}
.fbar{display:flex;gap:6px;margin-bottom:11px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px}
.fbar::-webkit-scrollbar{display:none}
.fb{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);white-space:nowrap;font-family:inherit;transition:all .15s}
.fb.on{background:var(--brown);color:#fff;border-color:var(--brown)}
.empty{text-align:center;padding:32px 0;color:var(--muted);font-size:14px}

/* =================== PRODUCTION =================== */
#prod-page{padding:11px}
.pir{display:flex;align-items:center;justify-content:space-between;padding:11px;background:var(--surface);border-radius:9px;margin-bottom:7px;box-shadow:0 2px 7px rgba(44,26,14,.08)}
.pir input{width:62px;padding:7px;border:1.5px solid var(--border);border-radius:7px;font-size:16px;text-align:center;font-family:inherit}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;font-size:13px;border-radius:7px;margin-bottom:4px}
.rok{background:#E8F5E9}.rshort{background:#FFEBEE}
.rq{font-weight:700}

/* =================== SETTINGS =================== */
#settings-page{padding:11px}
.seti{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--surface);border-radius:9px;margin-bottom:7px;box-shadow:0 2px 7px rgba(44,26,14,.08);gap:8px;flex-wrap:wrap}
.seti input{padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;text-align:right;font-family:inherit}
.toggle{position:relative;width:44px;height:25px;cursor:pointer;flex-shrink:0}
.toggle input{display:none}
.ttr{width:44px;height:25px;border-radius:13px;background:#ccc;transition:background .2s}
.toggle input:checked+.ttr{background:var(--green)}
.tth{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:left .2s}
.toggle input:checked~.tth{left:21px}

/* TOAST */
#toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1}

/* MODAL */
#mover{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
#mover.on{display:flex}
#mbox{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px}
#mbox h3{font-size:16px;font-weight:700;margin-bottom:10px}
#mbox p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.7}
.macts{display:flex;gap:10px}
.macts button{flex:1;padding:12px;border:none;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
#mcancel{background:var(--bg);color:var(--text)}
#mok{background:var(--red);color:#fff}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading h2{font-size:22px;font-weight:900;color:var(--brown);margin-bottom:6px}
#loading p{font-size:13px;color:var(--muted)}
.ld{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:18px}
@keyframes sp{to{transform:rotate(360deg)}}

select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);cursor:pointer}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld"></div>
  <h2>🍪 半吊子廚房</h2>
  <p>連接雲端資料庫中...</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div id="mover">
  <div id="mbox">
    <h3 id="mtitle"></h3>
    <p id="mmsg"></p>
    <div class="macts">
      <button id="mcancel">取消</button>
      <button id="mok">確認</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div id="hdr">
  <h1>🍪 半吊子廚房</h1>
  <div id="exp-badge"></div>
</div>

<!-- APP -->
<div id="app">

  <!-- POS -->
  <div id="pos-page" class="page on">
    <div id="exp-banner"></div>
    <div id="prod-grid"></div>
    <!-- CART -->
    <div id="cart">
      <div id="cart-hdr">
        <button id="cart-tog">🛒 購物車 <span id="c-cnt">0</span></button>
        <div id="c-total">NT$0</div>
      </div>
      <div id="cart-body"></div>
      <div id="amt-panel">
        <div class="qrow">
          <button class="qk qk-s" onclick="doStaff()">🪪 員工識別證<br><small>每罐 -NT$10</small></button>
          <button class="qk qk-p" onclick="doPR()">📦 公關出貨<br><small>金額 NT$0</small></button>
          <button class="qk qk-r" onclick="doReset()">↩ 恢復原價</button>
        </div>
        <div class="ai-row">
          <span style="font-size:13px;font-weight:700;white-space:nowrap">自訂 NT$</span>
          <input type="number" id="amt-input" placeholder="輸入金額" oninput="setAmt(this.value)">
        </div>
        <div class="a-info" id="a-info"></div>
      </div>
      <div id="cart-foot">
        <button id="btn-amt" onclick="togAmt()">✏️ 改金額</button>
        <button class="btn btn-pri" id="btn-co" onclick="checkout()" disabled style="flex:1;width:auto">結帳</button>
      </div>
    </div>
  </div>

  <!-- INVENTORY -->
  <div id="inv-page" class="page">
    <div class="stabs">
      <button class="stab on" onclick="swInv('stk')">成品庫存</button>
      <button class="stab" onclick="swInv('batch')">批次總覽</button>
      <button class="stab" onclick="swInv('mat')">原料庫存</button>
    </div>
    <div id="inv-stk"></div>
    <div id="inv-batch" style="display:none"></div>
    <div id="inv-mat" style="display:none"></div>
  </div>

  <!-- REPORTS -->
  <div id="report-page" class="page">
    <div class="stabs">
      <button class="stab on" onclick="swRpt('today')">今日</button>
      <button class="stab" onclick="swRpt('month')">月報表</button>
      <button class="stab" onclick="swRpt('annual')">年度排行</button>
      <button class="stab" onclick="swRpt('mv')">進出庫</button>
    </div>
    <div id="rpt-today"></div>
    <div id="rpt-month" style="display:none"></div>
    <div id="rpt-annual" style="display:none"></div>
    <div id="rpt-mv" style="display:none"></div>
  </div>

  <!-- PRODUCTION -->
  <div id="prod-page" class="page">
    <p style="font-size:13px;color:var(--muted);margin-bottom:11px">輸入各品項今日生產罐數，系統自動試算原料需求</p>
    <div id="prod-inputs"></div>
    <div id="prod-req"></div>
    <div id="prod-warn"></div>
    <button class="btn btn-pri" id="btn-cprod" style="display:none;margin-top:10px" onclick="doProduction()">✅ 確認生產</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings-page" class="page">
    <div class="stabs">
      <button class="stab on" onclick="swSet('prod')">商品</button>
      <button class="stab" onclick="swSet('stk')">成品庫存</button>
      <button class="stab" onclick="swSet('mat')">原料</button>
    </div>
    <div id="set-prod"></div>
    <div id="set-stk" style="display:none"></div>
    <div id="set-mat" style="display:none"></div>
  </div>

</div>

<!-- NAV -->
<nav id="nav">
  <button class="nb active" onclick="sw('pos')">
    <span class="ni" style="padding:3px 5px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></span>
    收銀
  </button>
  <button class="nb" onclick="sw('inv')">
    <span class="ni" style="padding:3px 5px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h2l3.5-9h9L20 20h2L13.3 4h-2.6L2 20zm5.66-5l1.34-3.44L10.34 15H7.66zM13.66 15l1.34-3.44L16.34 15h-2.68z"/></svg></span>
    庫存
  </button>
  <button class="nb" onclick="sw('report')">

function rPOS(){
  const today=new Date();today.setHours(0,0,0,0);
  const g=document.getElementById('prod-grid');
  g.innerHTML=S.prods.filter(p=>p.active).map(p=>{
    const stk=S.stks.find(s=>s.id===p.id)||{qty:0};
    const qty=stk.qty||0;
    const inC=S.cart.find(c=>c.id===p.id);
    const cartQ=inC?inC.qty:0;
    const avail=qty-cartQ;
    const hasExp=(S.batches[p.id]||[]).some(b=>{
      if(!b.qty)return false;
      const d=new Date(b.made);d.setHours(0,0,0,0);
      return Math.floor((today-d)/86400000)>=10;
    });
    const so=avail<=0;
    const low=!so&&qty<=5;
    return`<div class="pc ${so?'so':''} ${cartQ>0?'ic':''}" onclick="addCart(${p.id})">
      ${hasExp?'<div class="et">快過期</div>':''}
      ${cartQ>0?`<div class="cb">${cartQ}</div>`:''}
      <div class="pc-name">${p.name}</div>
      <div class="pc-price">NT$${p.price}</div>
      <div class="pc-stk ${low?'low':''}">${so?'售完':qty+'罐'}</div>
    </div>`;
  }).join('');
}

function addCart(pid){
  const stk=S.stks.find(s=>s.id===pid);
  const c=S.cart.find(c=>c.id===pid);
  const inC=c?c.qty:0;
  if(stk&&inC>=(stk.qty||0)){toast('庫存不足');return;}
  if(c)c.qty++;else S.cart.push({id:pid,qty:1});
  S.customAmt=null;
  rCart();rPOS();
}

function rCart(){
  const body=document.getElementById('cart-body');
  const tot=document.getElementById('c-total');
  const cnt=document.getElementById('c-cnt');
  const btn=document.getElementById('btn-co');
  cnt.textContent=S.cart.reduce((a,c)=>a+c.qty,0);
  if(!S.cart.length){
    body.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">購物車是空的</div>';
    tot.textContent='NT$0';btn.disabled=true;btn.textContent='結帳';
    document.getElementById('a-info').innerHTML='';return;
  }
  body.innerHTML=S.cart.map(c=>{
    const p=S.prods.find(p=>p.id===c.id);if(!p)return'';
    return`<div class="ci">
      <div class="ci-name">${p.name}</div>
      <div class="qc">
        <button class="qb" onclick="chQ(${c.id},-1)">−</button>
        <span class="qv">${c.qty}</span>
        <button class="qb" onclick="chQ(${c.id},1)">+</button>
      </div>
      <div class="ci-sub">NT$${p.price*c.qty}</div>
    </div>`;
  }).join('');
  const raw=S.cart.reduce((a,c)=>{const p=S.prods.find(p=>p.id===c.id);return a+(p?p.price*c.qty:0);},0);
  const final=S.customAmt!==null?S.customAmt:raw;
  tot.textContent='NT$'+final;
  btn.disabled=false;btn.textContent='結帳 NT$'+final;
  const info=document.getElementById('a-info');
  if(S.customAmt!==null){const sv=raw-S.customAmt;info.innerHTML=`原價 NT$${raw}，省了 <span class="a-save">NT$${sv}</span>`;}
  else info.innerHTML='';
}

function chQ(pid,d){
  const i=S.cart.findIndex(c=>c.id===pid);if(i<0)return;
  S.cart[i].qty+=d;if(S.cart[i].qty<=0)S.cart.splice(i,1);
  S.customAmt=null;rCart();rPOS();
}
function togAmt(){
  S.showAmt=!S.showAmt;
  document.getElementById('amt-panel').style.display=S.showAmt?'block':'none';
}
function doStaff(){
  const cans=S.cart.reduce((a,c)=>a+c.qty,0);
  const raw=S.cart.reduce((a,c)=>{const p=S.prods.find(p=>p.id===c.id);return a+(p?p.price*c.qty:0);},0);
  S.customAmt=raw-cans*10;document.getElementById('amt-input').value=S.customAmt;rCart();
}
function doPR(){S.customAmt=0;document.getElementById('amt-input').value=0;rCart();}
function doReset(){S.customAmt=null;document.getElementById('amt-input').value='';rCart();}
function setAmt(v){S.customAmt=v===''?null:parseInt(v)||0;rCart();}

async function checkout(){
  if(!S.cart.length)return;
  const raw=S.cart.reduce((a,c)=>{const p=S.prods.find(p=>p.id===c.id);return a+(p?p.price*c.qty:0);},0);
  const final=S.customAmt!==null?S.customAmt:raw;
  const disc=raw-final;
  const now=new Date();const m=ym();
  const newStks=JSON.parse(JSON.stringify(S.stks));
  const newBatches=JSON.parse(JSON.stringify(S.batches));
  const newMvs=[...S.mvs];
  const today=new Date();today.setHours(0,0,0,0);
  for(const ci of S.cart){
    const si=newStks.findIndex(s=>s.id===ci.id);
    if(si>=0)newStks[si].qty=Math.max(0,(newStks[si].qty||0)-ci.qty);
    // FIFO
    let rem=ci.qty;
    if(newBatches[ci.id]){
      newBatches[ci.id].sort((a,b)=>new Date(a.made)-new Date(b.made));
      for(const b of newBatches[ci.id]){if(rem<=0)break;const d=Math.min(b.qty,rem);b.qty-=d;rem-=d;}
      newBatches[ci.id]=newBatches[ci.id].filter(b=>b.qty>0);
    }
    const pr=S.prods.find(p=>p.id===ci.id);
    newMvs.unshift({type:'out',pid:ci.id,name:pr?.name||'',qty:ci.qty,time:now.toISOString(),note:'銷售'});
  }
  const rec={id:now.getTime(),time:now.toISOString(),
    items:S.cart.map(c=>{const p=S.prods.find(p=>p.id===c.id);return{id:c.id,name:p?.name||'',qty:c.qty,price:p?.price||0};}),
    total:final,rawTotal:raw,discount:disc};
  const newSales=[...(S.sm[m]||[]),rec];
  try{
    await Promise.all([
      POS.doc('inventory').set({stks:newStks,mats:S.mats}),
      POS.doc('batches').set(newBatches),
      POS.doc('movements').set({mvs:newMvs}),
      POS.doc('sales_'+m).set({list:newSales}),
    ]);
    S.cart=[];S.customAmt=null;S.showAmt=false;
    document.getElementById('amt-panel').style.display='none';
    document.getElementById('amt-input').value='';
    toast('✅ 結帳完成！NT$'+final);ra();
  }catch(e){toast('結帳失敗');}
}

async function qadj(pid,d){
  const i=S.stks.findIndex(s=>s.id===pid);if(i<0)return;
  S.stks[i].qty=Math.max(0,(S.stks[i].qty||0)+d);
  await POS.doc('inventory').set({stks:S.stks,mats:S.mats});
}
function togIn(pid){S.inForm[pid]=!S.inForm[pid];if(S.inForm[pid])S.inQty[pid]=0;rInvStk();}
function togAdj(pid){S.adjForm[pid]=!S.adjForm[pid];if(S.adjForm[pid])S.adjQty[pid]=0;rInvStk();}
function chIn(pid,d){S.inQty[pid]=Math.max(0,(S.inQty[pid]||0)+d);rInvStk();}
function chAdj(pid,d){S.adjQty[pid]=(S.adjQty[pid]||0)+d;rInvStk();}

async function confIn(pid){
  const qEl=document.getElementById('inq-'+pid);if(qEl)S.inQty[pid]=Math.max(0,parseInt(qEl.value)||0);
  const qty=S.inQty[pid]||0;if(qty<=0){toast('請輸入罐數');return;}
  const de=document.getElementById('ind-'+pid);if(!de?.value){toast('請填製作日期');return;}
  const made=de.value;
  const ns=JSON.parse(JSON.stringify(S.stks));
  const i=ns.findIndex(s=>s.id===pid);if(i>=0)ns[i].qty=(ns[i].qty||0)+qty;
  const nb=JSON.parse(JSON.stringify(S.batches));
  if(!nb[pid])nb[pid]=[];nb[pid].push({made,qty});
  const p=S.prods.find(p=>p.id===pid);
  const nm=[{type:'in',pid,name:p?.name||'',qty,time:new Date().toISOString(),made},...S.mvs];
  await Promise.all([POS.doc('inventory').set({stks:ns,mats:S.mats}),POS.doc('batches').set(nb),POS.doc('movements').set({mvs:nm})]);
  S.inForm[pid]=false;toast('✅ 進貨完成');
}

async function confAdj(pid){
  const qty=S.adjQty[pid]||0;if(qty===0){toast('請輸入數量');return;}
  const re=document.getElementById('ar-'+pid);if(!re?.value.trim()){toast('請填寫調整原因');return;}
  const reason=re.value.trim();
  const ns=JSON.parse(JSON.stringify(S.stks));
  const i=ns.findIndex(s=>s.id===pid);if(i>=0)ns[i].qty=Math.max(0,(ns[i].qty||0)+qty);
  const p=S.prods.find(p=>p.id===pid);
  const nm=[{type:'adj',pid,name:p?.name||'',qty,time:new Date().toISOString(),reason},...S.mvs];
  await Promise.all([POS.doc('inventory').set({stks:ns,mats:S.mats}),POS.doc('movements').set({mvs:nm})]);
  S.adjForm[pid]=false;toast('✅ 調整完成');
}

function togEditBatch(pid,bi){
  if(S._editBatch&&S._editBatch.pid===pid&&S._editBatch.bi===bi){S._editBatch=null;}
  else{S._editBatch={pid,bi};}
  rInvStk();
}
async function saveEditBatch(pid,bi){
  const el=document.getElementById(`eb-${pid}-${bi}`);
  if(!el?.value){toast('請選擇日期');return;}
  const nb=JSON.parse(JSON.stringify(S.batches));
  if(!nb[pid]||!nb[pid][bi]){toast('批次不存在');return;}
  nb[pid][bi].made=el.value;
  await POS.doc('batches').set(nb);

}

function rBatch(){
  const el=document.getElementById('inv-batch');

  let rows=[];
  S.prods.filter(p=>p.active).forEach(p=>{

  if(!dateEl?.value){toast('請填製作日期');return;}
  const made=dateEl.value;
  const p=S.prods.find(p=>p.id===pid);
  const ns=JSON.parse(JSON.stringify(S.stks));
  const nb=JSON.parse(JSON.stringify(S.batches));
  const i=ns.findIndex(s=>s.id===pid);if(i>=0)ns[i].qty=(ns[i].qty||0)+inFormQty;
  if(!nb[pid])nb[pid]=[];nb[pid].push({made,qty:inFormQty});
  const nm=[{type:'in',pid,name:p?.name||'',qty:inFormQty,time:new Date().toISOString(),made},...S.mvs];
  await Promise.all([POS.doc('inventory').set({stks:ns,mats:S.mats}),POS.doc('batches').set(nb),POS.doc('movements').set({mvs:nm})]);
  showInForm=false;inFormQty=0;toast('✅ 進庫記錄完成');
}

// REPORTS - ANNUAL RANKING
// =========================================================
let annualYear=new Date().getFullYear();
function rAnnual(){
  const el=document.getElementById('rpt-annual');
  // Load all months for the year if not already loaded
  const months=Array.from({length:12},(_,i)=>`${annualYear}${String(i+1).padStart(2,'0')}`);
  months.forEach(m=>{if(!S.sm[m])loadSales(m);});
  // Aggregate
  const fmap={};let totalAmt=0;let totalQty=0;let loadedAny=false;
  months.forEach(m=>{
    const sales=S.sm[m]||[];
    if(sales.length)loadedAny=true;
    sales.forEach(s=>{
      totalAmt+=s.total;
      s.items.forEach(it=>{
        totalQty+=it.qty;
        if(!fmap[it.name])fmap[it.name]={qty:0,amt:0};
        fmap[it.name].qty+=it.qty;fmap[it.name].amt+=it.qty*it.price;
      });
    });
  });
  const fl=Object.entries(fmap).map(([n,v])=>({n,...v})).sort((a,b)=>b.qty-a.qty);
  const mx=Math.max(...fl.map(f=>f.qty),1);
  const yearOpts=[annualYear,annualYear-1,annualYear-2].map(y=>`<option value="${y}" ${y===annualYear?'selected':''}>${y}年</option>`).join('');
  el.innerHTML=`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:13px">
      <select onchange="selYear(parseInt(this.value))">${yearOpts}</select>
      <span style="font-size:13px;color:var(--muted)">年度累積排行</span>
    </div>
    <div class="sc">
      <div class="scard"><div class="sv">NT$${totalAmt.toLocaleString()}</div><div class="sl">年度營業額</div></div>
      <div class="scard"><div class="sv">${totalQty}</div><div class="sl">年度銷售罐數</div></div>
      <div class="scard"><div class="sv">${fl.length}</div><div class="sl">有售口味數</div></div>
    </div>
    ${!fl.length?'<div class="empty">'+(loadedAny?'本年度尚無銷售資料':'載入中...')+'</div>':`
    <div class="stitle">年度口味排行 🏆</div>
    <div class="card">${fl.map((f,i)=>`
      <div class="brow2">
        <div class="blabel">${f.n}</div>
        <div class="btrack"><div class="bfill" style="width:${(f.qty/mx*100).toFixed(0)}%;background:${i===0?'linear-gradient(90deg,#C9952A,#F5C842)':i===1?'linear-gradient(90deg,#888,#bbb)':i===2?'linear-gradient(90deg,#8B4513,#CD853F)':'linear-gradient(90deg,var(--orange),var(--orange2))'}"><span class="bval">${f.qty}罐</span></div></div>
        <span class="bmed">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i===3?'4️⃣':i===4?'5️⃣':''}</span>
      </div>`).join('')}
    </div>
    <div class="stitle">各口味明細</div>
    <div class="card"><table class="st">
      <tr><th>排名</th><th>品項</th><th>銷售量</th><th>營業額</th></tr>
      ${fl.map((f,i)=>`<tr><td style="font-weight:700;color:${i===0?'#C9952A':i===1?'#888':i===2?'#8B4513':'var(--muted)'}">${i+1}</td><td>${f.n}</td><td>${f.qty} 罐</td><td>NT$${f.amt.toLocaleString()}</td></tr>`).join('')}
    </table></div>`}`;
}
function selYear(y){annualYear=y;const months=Array.from({length:12},(_,i)=>`${y}${String(i+1).padStart(2,'0')}`);months.forEach(m=>{if(!S.sm[m])loadSales(m);});setTimeout(rAnnual,800);}

// =========================================================
// PRODUCTION
// =========================================================
function rProd(){
  const pi=document.getElementById('prod-inputs');
  const pr=document.getElementById('prod-req');
  const pw=document.getElementById('prod-warn');
  const cb=document.getElementById('btn-cprod');
  const active=S.prods.filter(p=>p.active&&Object.keys(BOM[p.id]||{}).length>0);
  pi.innerHTML='<div class="stitle">今日生產計畫</div>'+active.map(p=>`
    <div class="pir">
      <div style="font-size:13px;font-weight:700">${p.name}</div>
      <input type="number" min="0" value="${S.plan[p.id]||0}" oninput="setPlan(${p.id},this.value)">
    </div>`).join('')+
    '<div style="font-size:12px;color:var(--muted);margin-top:5px">包心巧克力雪球、綜合雪球禮盒配方待補充，暫不計算</div>';
  const req={};let hasAny=false;
  active.forEach(p=>{
    const q=parseInt(S.plan[p.id])||0;if(!q)return;hasAny=true;
    Object.entries(BOM[p.id]||{}).forEach(([mid,pc])=>{const id=parseInt(mid);if(!req[id])req[id]=0;req[id]+=pc*q;});
  });
  if(!hasAny){pr.innerHTML='';pw.innerHTML='';cb.style.display='none';return;}
  let allOk=true;
  pr.innerHTML='<div class="stitle">原料需求</div><div class="card">'+
    Object.entries(req).map(([ms,need])=>{
      const mid=parseInt(ms);const mat=S.mats.find(m=>m.id===mid);if(!mat)return'';
      const have=mat.qty||0;const ok=have>=need;if(!ok)allOk=false;
      return`<div class="rrow ${ok?'rok':'rshort'}">
        <span>${mat.name}</span>
        <span class="rq" style="color:${ok?'#2E7D32':'#C62828'}">需 ${need.toFixed(3)} kg / 有 ${have.toFixed(2)} kg</span>
      </div>`;
    }).join('')+'</div>'+(allOk?'':'<div style="text-align:center;color:var(--red);font-size:13px;font-weight:700;padding:8px">❌ 原料不足，無法確認生產</div>');
  const lowMats=S.mats.filter(m=>(m.qty||0)<=m.min);
  pw.innerHTML=lowMats.length?'<div class="stitle">⚠️ 原料警示</div>'+lowMats.map(m=>`<div class="mi"><div class="mn">${m.name}</div><div class="mq mlow">${(m.qty||0).toFixed(2)} ${m.unit}</div></div>`).join(''):'';
  cb.style.display=allOk?'block':'none';
}
function setPlan(pid,v){S.plan[pid]=parseInt(v)||0;rProd();}
async function doProduction(){
  const active=S.prods.filter(p=>p.active&&Object.keys(BOM[p.id]||{}).length>0);
  const nm=JSON.parse(JSON.stringify(S.mats));const ns=JSON.parse(JSON.stringify(S.stks));const nb=JSON.parse(JSON.stringify(S.batches));
  const now=new Date();const made=now.toISOString().split('T')[0];const mvs2=[...S.mvs];
  active.forEach(p=>{
    const q=parseInt(S.plan[p.id])||0;if(!q)return;
    Object.entries(BOM[p.id]||{}).forEach(([ms,pc])=>{const mid=parseInt(ms);const i=nm.findIndex(m=>m.id===mid);if(i>=0)nm[i].qty=Math.max(0,Math.round(((nm[i].qty||0)-pc*q)*1000)/1000);});
    const si=ns.findIndex(s=>s.id===p.id);if(si>=0)ns[si].qty=(ns[si].qty||0)+q;
    if(!nb[p.id])nb[p.id]=[];nb[p.id].push({made,qty:q});
    mvs2.unshift({type:'in',pid:p.id,name:p.name,qty:q,time:now.toISOString(),made});
  });
  await Promise.all([POS.doc('inventory').set({stks:ns,mats:nm}),POS.doc('batches').set(nb),POS.doc('movements').set({mvs:mvs2})]);
  S.plan={};toast('✅ 生產完成，庫存已更新');rProd();
}

async function updStk(pid,v){const i=S.stks.findIndex(s=>s.id===pid);if(i>=0)S.stks[i].qty=parseInt(v)||0;await POS.doc('inventory').set({stks:S.stks,mats:S.mats});}
async function updM(mid,f,v){const i=S.mats.findIndex(m=>m.id===mid);if(i>=0)S.mats[i][f]=parseFloat(v)||0;await POS.doc('inventory').set({stks:S.stks,mats:S.mats});}
async function addM(){const n=prompt('原料名稱：');if(!n)return;const id=Math.max(...S.mats.map(m=>m.id),0)+1;S.mats.push({id,name:n,unit:'kg',qty:0,min:0});await POS.doc('inventory').set({stks:S.stks,mats:S.mats});toast('✅ 原料新增成功');}
