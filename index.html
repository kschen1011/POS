  DB.collection('pos').doc('inventory').onSnapshot(d=>{if(d.exists){const x=d.data();S.mats=x.mats;S.stks=x.stks;}else{S.mats=cp(DM);S.stks=cp(DS);sInv();}S.conn=true;S.il=true;tr();},()=>{document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#C03020;font-size:16px">\u26a0 無法連接雲端，請確認網路</div>';});
  DB.collection('pos').doc('sales_'+cym()).onSnapshot(d=>{S.sm[cym()]=d.exists?(d.data().items||[]):[];S.sl=true;tr();});
  DB.collection('pos').doc('meta').onSnapshot(d=>{S.am=d.exists?(d.data().months||[]):[];if(!S.selM)S.selM=cym();render();});
}
function render(){
  const el=document.getElementById('app');if(!el)return;
  if(!S.il||!S.sl||!S.pl){el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';return;}
  const ap=S.prods.filter(p=>p.enabled!==false);
  const ls=S.stks.filter(x=>x.stock<=5).length,lm=S.mats.filter(x=>x.stock<=x.min).length;
  el.innerHTML=`<div class="hdr"><div><div class="hdr-logo">半吊子廚房</div><div class="hdr-sub">THE HALF KITCHEN</div></div><div class="hdr-r"><span class="sync-dot${S.conn?'':' off'}"></span>${ls>0?`<span class="chip chip-w">成品偏低${ls}</span>`:''}${lm>0?`<span class="chip chip-d">材料不足${lm}</span>`:''}</div></div><div class="body">${S.tab==='pos'?rPOS(ap):S.tab==='inv'?rInv():S.tab==='rep'?rRep():S.tab==='prod'?rProd(ap):rSet()}</div><nav class="nav">${[['pos','\ud83e\uddfe','收銀'],['inv','\ud83d\udce6','庫存'],['rep','\ud83d\udcca','業績'],['prod','\ud83c\udf6a','生產'],['set','\u2699\ufe0f','設定']].map(([id,ic,lb])=>`<button class="nb${S.tab===id?' on':''}" onclick="T('${id}')"><span class="nb-icon">${ic}</span><span class="nb-label">${lb}</span></button>`).join('')}</nav>`;
}
function rPOS(prods){const tot=S.cart.reduce((s,i)=>s+i.price*i.qty,0);return`<div class="sec">點選商品</div><div class="pg">${prods.map(p=>{const sk=S.stks.find(x=>x.pid===p.id);const s=sk?sk.stock:0;return`<div class="pc${s===0?' out':''}" onclick="AC(${p.id})"><div class="pc-n">${p.name}</div><div class="pc-p">NT$ ${p.price}</div><div class="pc-s ${s===0?'pc-ou':s<=5?'pc-lo':''}">${s===0?'已售完':s<=5?`\u26a0 僅剩${s}罐`:`庫存 ${s} 罐`}</div></div>`;}).join('')}</div><div class="cart"><div class="c-ttl">\ud83d\uded2 購物車</div>${S.okMsg?`<div class="ok-msg">\u2713 結帳完成！NT$ ${S.okMsg}</div>`:''}${S.cart.length===0?'<div class="c-emp">點擊上方商品加入</div>':S.cart.map(i=>`<div class="ci"><div><div class="ci-n">${i.name}</div><div class="ci-pr">單價 NT$ ${i.price}</div></div><div class="qc"><button class="qb" onclick="UC(${i.id},-1)">\u2212</button><span class="qn">${i.qty}</span><button class="qb" onclick="UC(${i.id},1)">+</button></div><div class="ci-s">NT$ ${(i.price*i.qty).toLocaleString()}</div></div>`).join('')}<div class="ct"><span class="ct-l">合計</span><span class="ct-v">NT$ ${tot.toLocaleString()}</span></div><button class="co-btn" onclick="CO()" ${S.cart.length===0?'disabled':''}>&emsp;結&emsp;帳&emsp;</button></div>`;}
function rInv(){return`<div class="inv-card"><div class="inv-sec-hdr"><span>成品庫存（罐）</span></div>${S.stks.map(s=>`<div class="inv-row"><div class="inv-info"><div class="inv-n">${s.name}</div><div class="inv-u">罐</div></div><div class="inv-s ${s.stock<=3?'c-er':s.stock<=8?'c-wa':'c-ok'}">${s.stock}</div><div class="sc"><button class="sb" onclick="US(${s.id},-1)">\u2212</button><button class="sb" onclick="US(${s.id},1)">+</button></div></div>`).join('')}</div><div class="inv-card"><div class="inv-sec-hdr"><span>原料庫存</span></div>${S.mats.map(m=>`<div class="inv-row"><div class="inv-info"><div class="inv-n">${m.name}</div><div class="inv-u">${m.unit}，下限 ${m.min}</div></div><div class="inv-s ${m.stock<=m.min?'c-er':m.stock<=m.min*1.5?'c-wa':'c-ok'}">${m.stock}</div><div class="sc"><button class="sb" onclick="UM(${m.id},-0.1)">\u2212</button><button class="sb" onclick="UM(${m.id},0.1)">+</button></div></div>`).join('')}</div><p class="note">原料調整單位 ±0.1 kg／次</p>`;}
function rRep(){return`<div class="sub-tabs"><button class="stb${S.rv==='today'?' on':''}" onclick="S.rv='today';render()">今日記錄</button><button class="stb${S.rv==='month'?' on':''}" onclick="S.rv='month';render()">月報表</button></div>${S.rv==='today'?rToday():rMonth()}`;}
function rToday(){const ts=tsl(),tot=ts.reduce((s,x)=>s+x.total,0),avg=ts.length?Math.round(tot/ts.length):0;const tm={};ts.forEach(s=>s.items.forEach(i=>{tm[i.name]=(tm[i.name]||0)+i.qty}));const tops=Object.entries(tm).sort((a,b)=>b[1]-a[1]);const cfm=S.cfm?(()=>{if(S.cfm==='clearAll')return`<div class="confirm-box"><div class="confirm-title">確認清空今日記錄？</div><div class="confirm-detail">將刪除今日 ${ts.length} 筆交易並補回庫存，此操作無法復原。</div><div class="confirm-btns"><button class="btn-cancel" onclick="S.cfm=null;render()">取消</button><button class="btn-del" onclick="doClear()">確認清空</button></div></div>`;const sale=(S.sm[cym()]||[]).find(x=>x.id===S.cfm);if(!sale)return'';return`<div class="confirm-box"><div class="confirm-title">確認刪除此筆？</div><div class="confirm-detail">\ud83d\udd50 ${sale.time}&emsp;\ud83d\udcb0 NT$ ${sale.total.toLocaleString()}<br>${sale.items.map(i=>`${i.name} ×${i.qty}`).join('、')}<br><br>刪除後自動補回庫存。</div><div class="confirm-btns"><button class="btn-cancel" onclick="S.cfm=null;render()">取消</button><button class="btn-del" onclick="doDel(${sale.id})">確認刪除</button></div></div>`;})():'';return`<div class="sr"><div class="sc2"><div class="sc2-l">今日營業額</div><div class="sc2-v">NT$ ${tot.toLocaleString()}</div><div class="sc2-s">${td()}</div></div><div class="sc2"><div class="sc2-l">筆數</div><div class="sc2-v">${ts.length}</div><div class="sc2-s">筆</div></div><div class="sc2"><div class="sc2-l">客單價</div><div class="sc2-v">NT$ ${avg.toLocaleString()}</div><div class="sc2-s">平均</div></div></div>${tops.length>0?`<div class="sec">今日熱銷</div><div class="tops">${tops.map((t,i)=>`<span class="t-chip${i===0?' t1':''}">${t[0]} × ${t[1]}</span>`).join('')}</div>`:''}${cfm}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="sec" style="margin:0">交易記錄</div>${ts.length>0?`<button class="clr-btn" onclick="S.cfm='clearAll';render()">清空今日</button>`:''}</div><div class="tx-list">${ts.length===0?'<div class="empty">今日尚無交易記錄</div>':[...ts].reverse().map(s=>`<div class="tx"><div class="tx-info"><div class="tx-t">${s.time}</div><div class="tx-i">${s.items.map(i=>`${i.name}×${i.qty}`).join('、')}</div></div><div class="tx-v">NT$ ${s.total.toLocaleString()}</div><button class="tx-del" onclick="S.cfm=${s.id};render()">\u2715</button></div>`).join('')}</div>`;}
function rMonth(){const months=ams();if(!months.includes(S.selM))S.selM=months[0]||cym();const sales=S.sm[S.selM];if(sales===undefined){lMonth(S.selM);return`<div class="hint">載入中...</div>`;}const byP={};sales.forEach(s=>s.items.forEach(i=>{if(!byP[i.name])byP[i.name]={qty:0,rev:0};byP[i.name].qty+=i.qty;byP[i.name].rev+=i.price*i.qty;}));const rows=Object.entries(byP).sort((a,b)=>b[1].qty-a[1].qty);const totR=rows.reduce((s,r)=>s+r[1].rev,0),totQ=rows.reduce((s,r)=>s+r[1].qty,0);const maxQ=rows.length?Math.max(...rows.map(r=>r[1].qty)):1;return`<div class="month-row"><select class="month-sel" onchange="S.selM=this.value;render()">${months.map(m=>`<option value="${m}"${m===S.selM?' selected':''}>${yml(m)}</option>`).join('')}</select><button class="export-btn" onclick="expCSV()">\u2193 CSV</button></div><div class="sr" style="grid-template-columns:1fr 1fr"><div class="sc2"><div class="sc2-l">月營業額</div><div class="sc2-v">NT$ ${totR.toLocaleString()}</div></div><div class="sc2"><div class="sc2-l">月銷售量</div><div class="sc2-v">${totQ} 罐</div></div></div>${rows.length===0?`<div class="hint">此月份尚無記錄</div>`:`<div class="sec">銷售排行</div><div class="bar-wrap">${rows.map(([n,d])=>`<div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.qty/maxQ*100)}%"></div></div><div class="bar-val">${d.qty}</div></div>`).join('')}</div><div class="m-table"><div class="m-hdr"><span>品項</span><span>數量</span><span>營業額</span></div>${rows.map(([n,d])=>`<div class="m-row"><span class="m-name">${n}</span><span>${d.qty}罐</span><span>NT$ ${d.rev.toLocaleString()}</span></div>`).join('')}<div class="m-row tot"><span style="font-weight:700">合計</span><span style="font-weight:700">${totQ}罐</span><span style="font-weight:700">NT$ ${totR.toLocaleString()}</span></div></div>`}`;}
function rProd(prods){const req={};Object.entries(S.plan).forEach(([pid,qty])=>{if(!qty||qty<=0)return;Object.entries(BOM[pid]||{}).forEach(([mid,per])=>{req[mid]=(req[mid]||0)+per*qty});});const total=Object.values(S.plan).reduce((s,v)=>s+(v||0),0);const canP=total>0&&Object.entries(req).every(([mid,need])=>{const m=S.mats.find(x=>x.id===parseInt(mid));return m&&m.stock>=need});const low=S.mats.filter(m=>m.stock<=m.min);return`<div class="sec">今日生產計畫（罐）</div><div class="pr-card">${prods.map(p=>`<div class="pr-row"><div class="pr-n">${p.name}</div><input class="pr-in" type="number" min="0" inputmode="numeric" value="${S.plan[p.id]||''}" placeholder="0" oninput="UP(${p.id},this.value)"></div>`).join('')}<button class="pb ${canP?'pb-ok':'pb-di'}" ${canP?'':'disabled'} onclick="PD()">${total===0?'請輸入生產數量':canP?`\u2713 確認生產（共 ${total} 罐）`:'\u26a0 材料不足，無法生產'}</button></div><div class="sec">所需原料試算</div>${total===0?'<div class="hint">輸入上方數量後自動試算</div>':`<div class="mat-card">${S.mats.map(m=>{const need=req[m.id]||0;if(!need)return'';const ok=m.stock>=need;return`<div class="mr"><span class="mr-n">${m.name}</span><span class="${ok?'c-ok':'c-er'}" style="font-weight:700">需${need.toFixed(2)}${m.unit}（有${m.stock}）${ok?' \u2713':' \u2717'}</span></div>`;}).join('')}</div>`}<div class="sec" style="margin-top:14px">原料警示</div>${low.length===0?'<div class="all-ok">\u2713 所有原料庫存充足</div>':low.map(m=>`<div class="al">\u26a0 <strong>${m.name}</strong> 偏低（${m.stock}${m.unit}，下限${m.min}${m.unit}）</div>`).join('')}`;}

/* ===== 設定頁 ===== */
function rSet(){
  if(!S.ep)S.ep=cp(S.prods);
  if(!S.em)S.em=cp(S.mats);
  if(!S.es)S.es=cp(S.stks);
  return`${S.sok?`<div class="save-ok">\u2713 已儲存並同步至所有裝置！</div>`:''}
<div class="set-info">\u26a0\ufe0f 修改完成後請按「儲存並同步」，所有裝置會立即更新。</div>
<div class="set-section">
  <div class="set-section-hdr"><span>\ud83d\uded2 商品名稱與售價</span><button class="add-btn" onclick="addP()">＋ 新增商品</button></div>
  ${S.ep.map((p,i)=>`<div class="set-row">
    <div class="set-lbl">商品名稱</div>
    <input class="set-inp" type="text" value="${p.name}" oninput="S.ep[${i}].name=this.value">
    <div class="row2">
      <div><div class="set-lbl" style="margin-top:12px">售價（NT$）</div><input class="set-inp sm" type="number" inputmode="numeric" value="${p.price}" oninput="S.ep[${i}].price=parseInt(this.value)||0"></div>
      <div><div class="set-lbl" style="margin-top:12px">是否上架</div>
        <div class="toggle-row" style="padding:10px 0;border:none">
          <span class="toggle-label" style="font-size:14px">${p.enabled!==false?'上架中':'已下架'}</span>
          <label class="toggle"><input type="checkbox" ${p.enabled!==false?'checked':''} onchange="S.ep[${i}].enabled=this.checked;render()"><span class="tsl"></span></label>
        </div>
      </div>
    </div>
    <button class="del-btn" onclick="delP(${i})">✕ 刪除此商品</button>
  </div>`).join('')}
</div>
<div class="set-section">
  <div class="set-section-hdr"><span>\ud83d\udce6 成品庫存數量</span></div>
  ${S.es.map((s,i)=>`<div class="set-row">
    <div class="set-lbl">${s.name}</div>
    <input class="set-inp sm" type="number" inputmode="numeric" value="${s.stock}" oninput="S.es[${i}].stock=parseInt(this.value)||0">
  </div>`).join('')}
</div>
<div class="set-section">
  <div class="set-section-hdr"><span>\ud83e\uddc2 原料庫存與下限</span><button class="add-btn" onclick="addM()">＋ 新增原料</button></div>
  ${S.em.map((m,i)=>`<div class="set-row">
    <div class="set-lbl">原料名稱</div>
    <input class="set-inp" type="text" value="${m.name}" oninput="S.em[${i}].name=this.value">
    <div class="row3">
      <div><div class="set-lbl" style="margin-top:12px">現有庫存</div><input class="set-inp sm" type="number" inputmode="decimal" value="${m.stock}" oninput="S.em[${i}].stock=parseFloat(this.value)||0"></div>
      <div><div class="set-lbl" style="margin-top:12px">警示下限</div><input class="set-inp sm" type="number" inputmode="decimal" value="${m.min}" oninput="S.em[${i}].min=parseFloat(this.value)||0"></div>
      <div><div class="set-lbl" style="margin-top:12px">單位</div><input class="set-inp ctr" type="text" value="${m.unit}" oninput="S.em[${i}].unit=this.value"></div>
    </div>
    <button class="del-btn" onclick="delM(${i})">✕ 刪除此原料</button>
  </div>`).join('')}
</div>
<button class="save-btn" onclick="saveSet()">\ud83d\udcbe 儲存並同步至所有裝置</button>`;
}
function addP(){if(!S.ep)S.ep=cp(S.prods);const ni=nid(S.ep);S.ep.push({id:ni,name:'新商品',price:0,enabled:true});if(!S.es)S.es=cp(S.stks);S.es.push({id:nid(S.es),pid:ni,name:'新商品',stock:0});render();}
function delP(i){if(!confirm('確定要刪除這個商品嗎？'))return;const pid=S.ep[i].id;S.ep.splice(i,1);if(S.es)S.es=S.es.filter(s=>s.pid!==pid);render();}
function addM(){if(!S.em)S.em=cp(S.mats);S.em.push({id:nid(S.em),name:'新原料',unit:'kg',stock:0,min:0});render();}
function delM(i){if(!confirm('確定要刪除這個原料嗎？'))return;S.em.splice(i,1);render();}
function saveSet(){S.es=S.es.map(sk=>{const p=S.ep.find(x=>x.id===sk.pid);return p?{...sk,name:p.name}:sk;});S.prods=cp(S.ep);S.mats=cp(S.em);S.stks=cp(S.es);S.ep=null;S.em=null;S.es=null;S.sok=true;sProd();sInv();render();setTimeout(()=>{S.sok=false;},3000);}

function expCSV(){const sales=S.sm[S.selM]||[];const byP={};sales.forEach(s=>s.items.forEach(i=>{if(!byP[i.name])byP[i.name]={qty:0,rev:0};byP[i.name].qty+=i.qty;byP[i.name].rev+=i.price*i.qty;}));const rows=Object.entries(byP).sort((a,b)=>b[1].qty-a[1].qty);const totR=rows.reduce((s,r)=>s+r[1].rev,0),totQ=rows.reduce((s,r)=>s+r[1].qty,0);let csv='\uFEFF月份,品項,銷售量（罐）,營業額（NT$）\n';rows.forEach(([n,d])=>{csv+=`${yml(S.selM)},${n},${d.qty},${d.rev}\n`;});csv+=`${yml(S.selM)},合計,${totQ},${totR}\n`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`半吊子廚房_${S.selM}.csv`;a.click();}
function T(t){if(S.tab==='set'&&t!=='set'){S.ep=null;S.em=null;S.es=null;S.sok=false;}S.tab=t;S.okMsg=null;S.cfm=null;render();}
function AC(pid){const p=S.prods.find(x=>x.id===pid);if(!p)return;const ex=S.cart.find(i=>i.id===pid);if(ex)S.cart=S.cart.map(i=>i.id===pid?{...i,qty:i.qty+1}:i);else S.cart=[...S.cart,{id:p.id,name:p.name,price:p.price,qty:1}];S.okMsg=null;render();}
function UC(id,d){S.cart=S.cart.map(i=>i.id===id?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0);render();}
function CO(){if(!S.cart.length)return;const tot=S.cart.reduce((s,i)=>s+i.price*i.qty,0);const ym=cym();const sale={id:Date.now(),date:td(),time:tn(),items:S.cart.map(i=>({...i})),total:tot};if(!S.sm[ym])S.sm[ym]=[];S.sm[ym]=[...S.sm[ym],sale];S.stks=S.stks.map(s=>{const c=S.cart.find(x=>x.id===s.pid);return c?{...s,stock:Math.max(0,s.stock-c.qty)}:s});S.okMsg=tot.toLocaleString();S.cart=[];sInv();sSales(ym);render();}
function US(id,d){S.stks=S.stks.map(s=>s.id===id?{...s,stock:Math.max(0,s.stock+d)}:s);sInv();render();}
function UM(id,d){S.mats=S.mats.map(m=>m.id===id?{...m,stock:Math.max(0,parseFloat((m.stock+d).toFixed(3)))}:m);sInv();render();}
function UP(pid,v){S.plan={...S.plan,[pid]:Math.max(0,parseInt(v)||0)};render();}
function PD(){const req={};Object.entries(S.plan).forEach(([pid,qty])=>{if(!qty||qty<=0)return;Object.entries(BOM[pid]||{}).forEach(([mid,per])=>{req[mid]=(req[mid]||0)+per*qty});});S.mats=S.mats.map(m=>{const n=req[m.id]||0;return{...m,stock:parseFloat((m.stock-n).toFixed(3))};});S.stks=S.stks.map(s=>{const q=S.plan[s.pid]||0;return{...s,stock:s.stock+q};});S.plan={};sInv();render();}
function doDel(id){const ym=cym();const sale=(S.sm[ym]||[]).find(x=>x.id===id);if(sale){S.stks=S.stks.map(sk=>{const item=sale.items.find(i=>i.id===sk.pid);return item?{...sk,stock:sk.stock+item.qty}:sk});S.sm[ym]=S.sm[ym].filter(x=>x.id!==id);}S.cfm=null;sInv();sSales(ym);render();}
function doClear(){const ym=cym(),ts=tsl();ts.forEach(sale=>{S.stks=S.stks.map(sk=>{const item=sale.items.find(i=>i.id===sk.pid);return item?{...sk,stock:sk.stock+item.qty}:sk});});S.sm[ym]=(S.sm[ym]||[]).filter(x=>x.date!==td());S.cfm=null;sInv();sSales(ym);render();}
setup();
</script>
