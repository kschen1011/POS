<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>半吊子廚房 POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#F7F3EE;color:#1E1512;min-height:100vh;font-size:14px;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── 頁首 ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1E1512;color:#F7F3EE;flex-shrink:0}
.hdr-logo{font-size:15px;font-weight:700;letter-spacing:1px}
.hdr-sub{font-size:10px;color:#A89080;margin-top:1px}
.hdr-r{display:flex;gap:6px;align-items:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50}
.sync-dot.off{background:#F44336}
.chip{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700}
.chip-w{background:#7A4F00;color:#FFD080}
.chip-d{background:#6A1010;color:#FFB0B0}

/* ── 底部導覽 ── */
.nav{display:flex;background:#FFF;border-top:1px solid #DDD3C8;flex-shrink:0;height:56px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:#8A7060;font-family:inherit;padding:4px 2px}
.nb:active{background:#F0E8E0}
.nb.on{color:#1E1512}
.nb-icon{font-size:18px;line-height:1}
.nb-label{font-size:10px;font-weight:700}
.nb.on .nb-label{color:#C07040}

/* ── 主內容 ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ══ 收銀台佈局 ══ */
.pos-layout{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* 商品區 - 可滾動 */
.prod-area{flex:1;overflow-y:auto;padding:10px 10px 6px;min-height:0}
.prod-area::-webkit-scrollbar{width:3px}
.prod-area::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pc{background:#FFF;border:1.5px solid #E5D9CF;border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;user-select:none;transition:border-color .1s;position:relative}
.pc:active{background:#FFF0E6;border-color:#C07040;transform:scale(.96)}
.pc.out{opacity:.3;pointer-events:none}
.pc-n{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.4;min-height:32px;display:flex;align-items:center;justify-content:center}
.pc-p{font-size:14px;font-weight:700;color:#1E1512}
.pc-s{font-size:10px;margin-top:3px}
.pc-lo{color:#C07000;font-weight:700}
.pc-ou{color:#C04030;font-weight:700}
.pc-ok{color:#AFA090}
.pc-badge{position:absolute;top:-6px;right:-6px;background:#C07040;color:#FFF;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #F7F3EE}

/* 購物車區 - 固定在下方 */
.cart-area{flex-shrink:0;background:#FFF;border-top:1.5px solid #EDE5DC;max-height:42vh;display:flex;flex-direction:column}
.cart-items{overflow-y:auto;flex:1;min-height:0}
.cart-items::-webkit-scrollbar{width:3px}
.cart-items::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
.cart-emp{font-size:13px;color:#AFA090;text-align:center;padding:14px 0}
.ci{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid #F0E8E0}
.ci-n{font-size:13px;font-weight:700;flex:1}
.ci-pr{font-size:11px;color:#AFA090}
.qc{display:flex;align-items:center;gap:4px}
.qb{width:28px;height:28px;border-radius:8px;border:1px solid #D5C9BF;background:#F7F3EE;color:#1E1512;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.qb:active{background:#E5D9CF}
.qn{font-size:14px;font-weight:700;min-width:22px;text-align:center}
.ci-s{font-size:13px;font-weight:700;min-width:56px;text-align:right}

/* 結帳列 - 永遠可見 */
.checkout-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid #EDE5DC;flex-shrink:0;background:#FFF}
.cart-summary{flex:1}
.cart-count{font-size:11px;color:#AFA090;font-weight:500}
.cart-total{font-size:20px;font-weight:700;line-height:1.1}
.co-btn{padding:12px 20px;background:#1E1512;color:#F7F3EE;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.co-btn:active{background:#C07040}
.co-btn:disabled{background:#C5B8AF}
.ok-strip{background:#E8F5E8;border-top:1px solid #80C080;padding:8px 12px;font-size:13px;color:#2A6A2A;font-weight:700;text-align:center;flex-shrink:0}

/* ══ 一般頁面（庫存、業績、生產、設定）══ */
.scroll-page{flex:1;overflow-y:auto;padding:12px 12px 12px;min-height:0}
.scroll-page::-webkit-scrollbar{width:3px}
.scroll-page::-webkit-scrollbar-thumb{background:#D5C9BF;border-radius:999px}
.sec{font-size:11px;font-weight:700;color:#9A8070;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}

/* 庫存 */
.inv-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-bottom:12px}
.inv-sec-hdr{padding:10px 14px;background:#F7F3EE;border-bottom:1px solid #EDE5DC}
.inv-sec-hdr span{font-size:12px;font-weight:700;color:#9A8070;text-transform:uppercase;letter-spacing:.5px}
.inv-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #EDE5DC}
.inv-info{flex:1}
.inv-n{font-size:14px;font-weight:700}
.inv-u{font-size:11px;color:#AFA090;margin-top:1px}
.inv-s{font-size:18px;font-weight:700;min-width:36px;text-align:center}
.c-ok{color:#2A7A2A}.c-wa{color:#B06000}.c-er{color:#C03020}
.sc{display:flex;gap:4px}
.sb{width:34px;height:34px;border-radius:8px;border:1px solid #D5C9BF;background:#F7F3EE;color:#1E1512;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sb:active{background:#E5D9CF}

/* 業績 */
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.stb{flex:1;padding:10px;font-size:13px;font-weight:700;border:1px solid #D5C9BF;border-radius:10px;cursor:pointer;background:#FFF;color:#8A7060;font-family:inherit;text-align:center}
.stb.on{background:#1E1512;color:#F7F3EE;border-color:#1E1512}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sc2{background:#FFF;border:1px solid #E5D9CF;border-radius:12px;padding:10px 12px}
.sc2-l{font-size:10px;font-weight:700;color:#9A8070;margin-bottom:4px;text-transform:uppercase}
.sc2-v{font-size:18px;font-weight:700}
.sc2-s{font-size:10px;color:#AFA090;margin-top:2px}
.tops{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.t-chip{font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:#F0E8E0}
.t1{background:#1E1512;color:#F7F3EE}
.tx-list{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden}
.tx{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid #EDE5DC}
.tx:first-child{border-top:none}
.tx-info{flex:1}
.tx-t{font-size:12px;color:#7A6050;font-weight:700}
.tx-i{font-size:11px;color:#AFA090;margin-top:2px;line-height:1.5}
.tx-v{font-size:14px;font-weight:700;white-space:nowrap}
.tx-del{width:34px;height:34px;border-radius:8px;border:1px solid #FFAAAA;background:none;color:#C03020;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-del:active{background:#FFEEEE}
.empty{padding:24px;text-align:center;font-size:13px;color:#AFA090}
.confirm-box{background:#FFF;border:2px solid #FFAAAA;border-radius:14px;padding:16px;margin-bottom:12px}
.confirm-title{font-size:15px;font-weight:700;margin-bottom:6px}
.confirm-detail{font-size:13px;color:#7A6050;margin-bottom:12px;line-height:1.6}
.confirm-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:12px;border:1px solid #D5C9BF;border-radius:10px;background:#FFF;color:#1E1512;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.btn-cancel:active{background:#F7F3EE}
.btn-del{flex:1;padding:12px;border:none;border-radius:10px;background:#C03020;color:#FFF;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.clr-btn{padding:8px 12px;border:1px solid #FFAAAA;border-radius:8px;background:none;color:#C03020;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.month-row{display:flex;gap:8px;margin-bottom:12px}
.month-sel{flex:1;padding:10px;border:1px solid #D5C9BF;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;background:#FFF;color:#1E1512}
.export-btn{padding:10px 14px;border:1px solid #D5C9BF;border-radius:10px;background:#FFF;color:#7A6050;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.m-table{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-top:10px}
.m-hdr{display:grid;grid-template-columns:1fr 60px 80px;background:#F7F3EE}
.m-hdr span{font-size:11px;font-weight:700;color:#9A8070;padding:8px 12px}
.m-hdr span:not(:first-child){text-align:right}
.m-row{display:grid;grid-template-columns:1fr 60px 80px;border-top:1px solid #EDE5DC}
.m-row.tot{background:#F7F3EE}
.m-row span{font-size:13px;padding:10px 12px}
.m-row span:not(:first-child){text-align:right}
.m-name{font-weight:700}
.bar-wrap{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:12px;margin-bottom:4px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:12px;font-weight:600;color:#7A6050;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:#F0E8E0;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:#1E1512;border-radius:999px}
.bar-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}

/* 生產 */
.pr-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:14px;margin-bottom:12px}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EDE5DC}
.pr-row:last-of-type{border-bottom:none}
.pr-n{font-size:14px;font-weight:700}
.pr-in{width:70px;padding:8px;border:1px solid #D5C9BF;border-radius:8px;font-size:16px;font-weight:700;text-align:center;font-family:inherit;background:#F7F3EE;color:#1E1512}
.pr-in:focus{outline:none;border-color:#C07040}
.mat-card{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;padding:14px;margin-bottom:12px}
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EDE5DC;font-size:13px}
.mr:last-child{border-bottom:none}
.mr-n{color:#7A6050;font-weight:600}
.pb{width:100%;margin-top:10px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.pb-ok{background:#2A7A2A;color:#FFF}
.pb-ok:active{background:#1E5A1E}
.pb-di{background:#E5D9CF;color:#AFA090}
.al{background:#FFF8E0;border:1px solid #E0C040;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;color:#6A4A00}
.all-ok{background:#E8F5E8;border:1px solid #80C080;border-radius:8px;padding:10px 12px;font-size:13px;color:#2A6A2A;font-weight:600}
.hint{background:#F7F3EE;border-radius:12px;padding:20px;text-align:center;font-size:13px;color:#AFA090}

/* 設定頁 */
.set-section{background:#FFF;border:1px solid #E5D9CF;border-radius:14px;overflow:hidden;margin-bottom:12px}
.set-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#F7F3EE;border-bottom:1px solid #EDE5DC}
.set-section-hdr span{font-size:13px;font-weight:700;color:#1E1512}
.add-btn{padding:8px 14px;border:1px solid #C07040;border-radius:8px;background:none;color:#C07040;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.add-btn:active{background:#FFF0E6}
.set-row{padding:12px 14px;border-top:1px solid #EDE5DC}
.set-lbl{font-size:11px;color:#9A8070;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.set-inp{width:100%;padding:10px 12px;border:1px solid #E5D9CF;border-radius:10px;font-size:14px;font-family:inherit;background:#F7F3EE;color:#1E1512}
.set-inp:focus{outline:none;border-color:#C07040;background:#FFF}
.set-inp.sm{text-align:right}
.set-inp.ctr{text-align:center}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 70px;gap:8px;margin-top:10px}
.del-btn{width:100%;padding:10px;border:1px solid #FFAAAA;border-radius:10px;background:none;color:#C03020;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;margin-top:10px}
.del-btn:active{background:#FFEEEE}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid #EDE5DC;margin-top:8px}
.toggle-label{font-size:13px;font-weight:700}
.toggle{position:relative;width:48px;height:28px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#CCC;border-radius:999px;cursor:pointer;transition:.3s}
.tsl:before{content:'';position:absolute;width:20px;height:20px;left:4px;bottom:4px;background:#FFF;border-radius:50%;transition:.3s}
.toggle input:checked+.tsl{background:#2A7A2A}
.toggle input:checked+.tsl:before{transform:translateX(20px)}
.save-btn{width:100%;padding:16px;background:#C07040;color:#FFF;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.save-btn:active{background:#A05020}
.save-ok{background:#E8F5E8;border:1px solid #80C080;border-radius:10px;padding:12px;margin-bottom:12px;font-size:14px;color:#2A6A2A;font-weight:700;text-align:center}
.set-info{background:#FFF8E0;border:1px solid #E0C040;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#6A4A00;line-height:1.6}
.note{font-size:11px;color:#AFA090;text-align:center;margin-top:6px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#9A8070;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #E5D9CF;border-top-color:#C07040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.amt-panel{background:#FFF8F0;border-top:1px solid #F0D8C0;padding:8px 12px;flex-shrink:0}
.amt-title{font-size:11px;font-weight:700;color:#9A8070;margin-bottom:6px;text-transform:uppercase}
.amt-quick{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.aq{padding:6px 11px;border:1px solid #C07040;border-radius:999px;background:none;color:#C07040;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.aq.sel{background:#C07040;color:#FFF}
.amt-inp{flex:1;padding:8px 12px;border:1.5px solid #C07040;border-radius:10px;font-size:18px;font-weight:700;font-family:inherit;background:#FFF;color:#1E1512;text-align:right}
.amt-inp:focus{outline:none}
.edit-amt-btn{padding:8px 10px;border:1.5px solid #C07040;border-radius:10px;background:none;color:#C07040;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.edit-amt-btn.on{background:#C07040;color:#FFF}
.edit-amt-btn:disabled{border-color:#D5C9BF;color:#AFA090}
.co-orig{font-size:11px;color:#AFA090;text-decoration:line-through;margin-left:4px}
.co-cus{font-size:11px;background:#E8F5E8;color:#2A7A2A;padding:2px 6px;border-radius:999px;font-weight:700;margin-left:4px}
.exp-banner{background:#FFF0EE;border:1.5px solid #FFAAAA;border-radius:14px;padding:14px;margin-bottom:12px}
.exp-banner-title{font-size:13px;font-weight:700;color:#C03020;margin-bottom:8px}
.exp-it{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid #FFD0C8}
.exp-it:last-child{border-bottom:none}
.exp-nm{font-size:13px;font-weight:700}
.exp-detail{font-size:12px;color:#C03020;font-weight:600}
.exp-days{font-size:11px;background:#FFEEEE;color:#C03020;padding:2px 7px;border-radius:999px;font-weight:700;margin-left:6px}
.exp-msg{font-size:12px;color:#C07040;margin-top:8px;font-style:italic;line-height:1.6}
.in-btn{padding:5px 10px;border:1px solid #2A7A2A;border-radius:999px;background:none;color:#2A7A2A;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.adj-btn{padding:5px 10px;border:1px solid #C07040;border-radius:999px;background:none;color:#C07040;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.in-form{background:#F0FAF0;border:1px solid #A0D0A0;border-radius:10px;padding:12px;margin-top:8px}
.in-form-t{font-size:12px;font-weight:700;color:#2A7A2A;margin-bottom:10px}
.in-lbl{font-size:11px;color:#9A8070;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase}
.in-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.iqb{width:36px;height:36px;border-radius:10px;border:1.5px solid #2A7A2A;background:#FFF;color:#2A7A2A;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.iqb.w{width:auto;padding:0 10px;font-size:13px}
.iq-val{font-size:22px;font-weight:700;min-width:44px;text-align:center}
.in-date{width:100%;padding:10px;border:1.5px solid #D5C9BF;border-radius:10px;font-size:14px;font-family:inherit;background:#FFF;color:#1E1512;margin-bottom:10px}
.in-date:focus{outline:none;border-color:#2A7A2A}
.form-btns{display:flex;gap:8px}
.f-ok{flex:2;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#FFF}
.f-ok.g{background:#2A7A2A}
.f-ok.a{background:#C07040}
.f-ok:disabled{opacity:.4}
.f-cancel{flex:1;padding:11px;background:none;border:1px solid #D5C9BF;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#7A6050}
.b-list{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.b-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;background:#F7F3EE;font-size:12px}
.b-item.old{background:#FFEEEE;border:1px solid #FFB0B0}
.b-date{color:#7A6050;font-weight:600;flex:1}
.b-qty{font-weight:700}
.b-ok{font-size:10px;color:#2A7A2A;background:#E8F5E8;padding:1px 6px;border-radius:999px}
.b-er{font-size:10px;color:#C03020;background:#FFEEEE;padding:1px 6px;border-radius:999px}
.adj-form{background:#FFF8E8;border:1px solid #E0C040;border-radius:10px;padding:12px;margin-top:8px}
.adj-form-t{font-size:12px;font-weight:700;color:#7A5000;margin-bottom:10px}
.adj-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.aqb{width:36px;height:36px;border-radius:10px;border:1.5px solid #C07040;background:#FFF;color:#C07040;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.aqb.w{width:auto;padding:0 10px;font-size:13px}
.aq-val{font-size:20px;font-weight:700;min-width:44px;text-align:center}
.aq-pos{color:#2A7A2A}
.aq-neg{color:#C03020}
.adj-note{width:100%;padding:10px;border:1.5px solid #D5C9BF;border-radius:10px;font-size:14px;font-family:inherit;background:#FFF;color:#1E1512;margin-bottom:10px}

  const tops=Object.entries(tm).sort((a,b)=>b[1]-a[1]);
  const cfm=S.cfm?(()=>{if(S.cfm==='clearAll')return`<div class="confirm-box"><div class="confirm-title">確認清空今日記錄？</div><div class="confirm-detail">將刪除今日 ${ts.length} 筆交易並補回庫存，此操作無法復原。</div><div class="confirm-btns"><button class="btn-cancel" onclick="S.cfm=null;render()">取消</button><button class="btn-del" onclick="doClear()">確認清空</button></div></div>`;const sale=(S.sm[cym()]||[]).find(x=>x.id===S.cfm);if(!sale)return'';return`<div class="confirm-box"><div class="confirm-title">確認刪除此筆？</div><div class="confirm-detail">🕐 ${sale.time}　NT$ ${sale.total.toLocaleString()}<br>${sale.items.map(i=>`${i.name} ×${i.qty}`).join('、')}<br><br>刪除後自動補回庫存。</div><div class="confirm-btns"><button class="btn-cancel" onclick="S.cfm=null;render()">取消</button><button class="btn-del" onclick="doDel(${sale.id})">確認刪除</button></div></div>`;})():'';
  return`<div class="sr"><div class="sc2"><div class="sc2-l">今日營業額</div><div class="sc2-v">NT$ ${tot.toLocaleString()}</div><div class="sc2-s">${td()}</div></div><div class="sc2"><div class="sc2-l">筆數</div><div class="sc2-v">${ts.length}</div><div class="sc2-s">筆</div></div><div class="sc2"><div class="sc2-l">客單價</div><div class="sc2-v">NT$ ${avg.toLocaleString()}</div><div class="sc2-s">平均</div></div></div>${tops.length>0?`<div class="sec">今日熱銷</div><div class="tops">${tops.map((t,i)=>`<span class="t-chip${i===0?' t1':''}">${t[0]} × ${t[1]}</span>`).join('')}</div>`:''}${cfm}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="sec" style="margin:0">交易記錄</div>${ts.length>0?`<button class="clr-btn" onclick="S.cfm='clearAll';render()">清空今日</button>`:''}</div><div class="tx-list">${ts.length===0?'<div class="empty">今日尚無交易記錄</div>':[...ts].reverse().map(s=>`<div class="tx"><div class="tx-info"><div class="tx-t">${s.time}</div><div class="tx-i">${s.items.map(i=>`${i.name}×${i.qty}`).join('、')}</div></div><div class="tx-v">NT$ ${s.total.toLocaleString()}</div><button class="tx-del" onclick="S.cfm=${s.id};render()">✕</button></div>`).join('')}</div>`;
}

function rMonth(){
  const months=ams();if(!months.includes(S.selM))S.selM=months[0]||cym();
  const sales=S.sm[S.selM];if(sales===undefined){lMonth(S.selM);return`<div class="hint">載入中...</div>`;}
  const byP={};sales.forEach(s=>s.items.forEach(i=>{if(!byP[i.name])byP[i.name]={qty:0,rev:0};byP[i.name].qty+=i.qty;byP[i.name].rev+=i.price*i.qty;}));
  const rows=Object.entries(byP).sort((a,b)=>b[1].qty-a[1].qty);
  const totR=rows.reduce((s,r)=>s+r[1].rev,0),totQ=rows.reduce((s,r)=>s+r[1].qty,0);
  const maxQ=rows.length?Math.max(...rows.map(r=>r[1].qty)):1;
  return`<div class="month-row"><select class="month-sel" onchange="S.selM=this.value;render()">${months.map(m=>`<option value="${m}"${m===S.selM?' selected':''}>${yml(m)}</option>`).join('')}</select><button class="export-btn" onclick="expCSV()">↓ CSV</button></div><div class="sr" style="grid-template-columns:1fr 1fr"><div class="sc2"><div class="sc2-l">月營業額</div><div class="sc2-v">NT$ ${totR.toLocaleString()}</div></div><div class="sc2"><div class="sc2-l">月銷售量</div><div class="sc2-v">${totQ} 罐</div></div></div>${rows.length===0?`<div class="hint">此月份尚無記錄</div>`:`<div class="sec">銷售排行</div><div class="bar-wrap">${rows.map(([n,d])=>`<div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.qty/maxQ*100)}%"></div></div><div class="bar-val">${d.qty}</div></div>`).join('')}</div><div class="m-table"><div class="m-hdr"><span>品項</span><span>數量</span><span>營業額</span></div>${rows.map(([n,d])=>`<div class="m-row"><span class="m-name">${n}</span><span>${d.qty}罐</span><span>NT$ ${d.rev.toLocaleString()}</span></div>`).join('')}<div class="m-row tot"><span style="font-weight:700">合計</span><span style="font-weight:700">${totQ}罐</span><span style="font-weight:700">NT$ ${totR.toLocaleString()}</span></div></div>`}`;
}

function rMov(){
  let mvs=[...S.mvs].sort((a,b)=>b.id-a.id);
  if(S.mvType!=='all')mvs=mvs.filter(m=>m.type===S.mvType);
  if(S.mvDate)mvs=mvs.filter(m=>m.date===new Date(S.mvDate).toLocaleDateString('zh-TW'));
  const inTot=S.mvs.filter(m=>m.type==='in').reduce((s,m)=>s+m.qty,0);
  const outTot=S.mvs.filter(m=>m.type==='out').reduce((s,m)=>s+m.qty,0);
  const adjCnt=S.mvs.filter(m=>m.type==='adj').length;
  return`<div class="mv-filt">
<span class="filt-lbl">篩選</span>
<button class="fb${S.mvType==='all'?' on':''}" onclick="setMvType('all')">全部</button>
<button class="fb${S.mvType==='in'?' in-on':''}" onclick="setMvType('in')">進庫</button>
<button class="fb${S.mvType==='out'?' out-on':''}" onclick="setMvType('out')">出庫</button>
<button class="fb${S.mvType==='adj'?' adj-on':''}" onclick="setMvType('adj')">人工調整</button>
<input class="filt-date" type="date" value="${S.mvDate||''}" onchange="setMvDate(this.value)">
${S.mvDate?`<button class="fb" onclick="clearMvDate()">清除</button>`:''}
</div>
<div class="sr" style="grid-template-columns:repeat(3,1fr)">
<div class="sc2"><div class="sc2-l">進庫合計</div><div class="sc2-v" style="color:#2A7A2A">+${inTot}</div><div class="sc2-s">罐</div></div>
<div class="sc2"><div class="sc2-l">出庫合計</div><div class="sc2-v" style="color:#C03020">-${outTot}</div><div class="sc2-s">罐</div></div>
<div class="sc2"><div class="sc2-l">人工調整</div><div class="sc2-v" style="color:#C07040">${adjCnt}</div><div class="sc2-s">筆</div></div>
</div>
<div class="tx-list">${mvs.length===0?'<div style="padding:24px;text-align:center;font-size:13px;color:#AFA090">尚無記錄</div>':mvs.map(m=>`<div class="tx">
<span class="mv-badge ${m.type==='in'?'mv-in':m.type==='adj'?'mv-adj':'mv-out'}">${m.type==='in'?'進庫':m.type==='adj'?'人工調整':'出庫'}</span>
<div class="tx-info" style="margin-left:8px"><div style="font-size:12px;color:#7A6050;font-weight:700">${m.name}</div><div style="font-size:11px;color:#AFA090;margin-top:2px">${m.date} ${m.time}${m.type==='in'?' · 製作 '+m.prodDate:''}${m.note?' · '+m.note:''}</div></div>
<div style="font-size:14px;font-weight:700;color:${m.type==='in'?'#2A7A2A':m.type==='adj'?'#C07040':'#C03020'}">${m.type==='in'?'+':m.type==='adj'?(m.adjDir||''):'−'}${m.qty}</div>
</div>`).join('')}</div>`;
}

function rProd(prods){
  const req={};Object.entries(S.plan).forEach(([pid,qty])=>{if(!qty||qty<=0)return;Object.entries(BOM[pid]||{}).forEach(([mid,per])=>{req[mid]=(req[mid]||0)+per*qty});});
  const total=Object.values(S.plan).reduce((s,v)=>s+(v||0),0);
  const canP=total>0&&Object.entries(req).every(([mid,need])=>{const m=S.mats.find(x=>x.id===parseInt(mid));return m&&m.stock>=need});
  const low=S.mats.filter(m=>m.stock<=m.min);
  return`<div class="sec">今日生產計畫（罐）</div><div class="pr-card">${prods.map(p=>`<div class="pr-row"><div class="pr-n">${p.name}</div><input class="pr-in" type="number" min="0" inputmode="numeric" value="${S.plan[p.id]||''}" placeholder="0" oninput="UP(${p.id},this.value)"></div>`).join('')}<button class="pb ${canP?'pb-ok':'pb-di'}" ${canP?'':'disabled'} onclick="PD()">${total===0?'請輸入生產數量':canP?`✓ 確認生產（共 ${total} 罐）`:'⚠ 材料不足'}</button></div><div class="sec">所需原料試算</div>${total===0?'<div class="hint">輸入上方數量後自動試算</div>':`<div class="mat-card">${S.mats.map(m=>{const need=req[m.id]||0;if(!need)return'';const ok=m.stock>=need;return`<div class="mr"><span class="mr-n">${m.name}</span><span class="${ok?'c-ok':'c-er'}" style="font-weight:700">需${need.toFixed(2)}${m.unit}（有${m.stock}）${ok?' ✓':' ✗'}</span></div>`;}).join('')}</div>`}<div class="sec" style="margin-top:12px">原料警示</div>${low.length===0?'<div class="all-ok">✓ 所有原料庫存充足</div>':low.map(m=>`<div class="al">⚠ <strong>${m.name}</strong> 偏低（${m.stock}${m.unit}，下限${m.min}${m.unit}）</div>`).join('')}`;
}

function rSet(){
  if(!S.ep)S.ep=cp(S.prods);if(!S.em)S.em=cp(S.mats);if(!S.es)S.es=cp(S.stks);
  return`${S.sok?`<div class="save-ok">✓ 已儲存並同步！</div>`:''}
<div class="set-info">修改完成後請按「儲存並同步」。</div>
<div class="set-section"><div class="set-section-hdr"><span>🛍 商品名稱與售價</span><button class="add-btn" onclick="addP()">＋ 新增</button></div>${S.ep.map((p,i)=>`<div class="set-row"><div class="set-lbl">商品名稱</div><input class="set-inp" type="text" value="${p.name}" oninput="S.ep[${i}].name=this.value"><div class="row2"><div><div class="set-lbl" style="margin-top:10px">售價（NT$）</div><input class="set-inp sm" type="number" inputmode="numeric" value="${p.price}" oninput="S.ep[${i}].price=parseInt(this.value)||0"></div><div><div class="set-lbl" style="margin-top:10px">是否上架</div><div class="toggle-row" style="padding:8px 0;border:none"><span class="toggle-label">${p.enabled!==false?'上架中':'已下架'}</span><label class="toggle"><input type="checkbox" ${p.enabled!==false?'checked':''} onchange="S.ep[${i}].enabled=this.checked;render()"><span class="tsl"></span></label></div></div></div><button class="del-btn" onclick="delP(${i})">✕ 刪除此商品</button></div>`).join('')}</div>
<div class="set-section"><div class="set-section-hdr"><span>📦 成品庫存數量</span></div>${S.es.map((s,i)=>`<div class="set-row"><div class="set-lbl">${s.name}</div><input class="set-inp sm" type="number" inputmode="numeric" value="${s.stock}" oninput="S.es[${i}].stock=parseInt(this.value)||0"></div>`).join('')}</div>
<div class="set-section"><div class="set-section-hdr"><span>🧂 原料庫存與下限</span><button class="add-btn" onclick="addM()">＋ 新增</button></div>${S.em.map((m,i)=>`<div class="set-row"><div class="set-lbl">原料名稱</div><input class="set-inp" type="text" value="${m.name}" oninput="S.em[${i}].name=this.value"><div class="row3"><div><div class="set-lbl" style="margin-top:10px">現有庫存</div><input class="set-inp sm" type="number" inputmode="decimal" value="${m.stock}" oninput="S.em[${i}].stock=parseFloat(this.value)||0"></div><div><div class="set-lbl" style="margin-top:10px">警示下限</div><input class="set-inp sm" type="number" inputmode="decimal" value="${m.min}" oninput="S.em[${i}].min=parseFloat(this.value)||0"></div><div><div class="set-lbl" style="margin-top:10px">單位</div><input class="set-inp ctr" type="text" value="${m.unit}" oninput="S.em[${i}].unit=this.value"></div></div><button class="del-btn" onclick="delM(${i})">✕ 刪除此原料</button></div>`).join('')}</div>
<button class="save-btn" onclick="saveSet()">💾 儲存並同步至所有裝置</button>`;
}

function addP(){if(!S.ep)S.ep=cp(S.prods);const ni=nid(S.ep);S.ep.push({id:ni,name:'新商品',price:0,enabled:true});if(!S.es)S.es=cp(S.stks);S.es.push({id:nid(S.es),pid:ni,name:'新商品',stock:0});render();}
function delP(i){if(!confirm('確定要刪除這個商品嗎？'))return;const pid=S.ep[i].id;S.ep.splice(i,1);if(S.es)S.es=S.es.filter(s=>s.pid!==pid);render();}
function addM(){if(!S.em)S.em=cp(S.mats);S.em.push({id:nid(S.em),name:'新原料',unit:'kg',stock:0,min:0});render();}
function delM(i){if(!confirm('確定要刪除這個原料嗎？'))return;S.em.splice(i,1);render();}
function saveSet(){S.es=S.es.map(sk=>{const p=S.ep.find(x=>x.id===sk.pid);return p?{...sk,name:p.name}:sk;});S.prods=cp(S.ep);S.mats=cp(S.em);S.stks=cp(S.es);S.ep=null;S.em=null;S.es=null;S.sok=true;sProd();sInv();render();setTimeout(()=>{S.sok=false;},3000);}
function expCSV(){const sales=S.sm[S.selM]||[];const byP={};sales.forEach(s=>s.items.forEach(i=>{if(!byP[i.name])byP[i.name]={qty:0,rev:0};byP[i.name].qty+=i.qty;byP[i.name].rev+=i.price*i.qty;}));const rows=Object.entries(byP).sort((a,b)=>b[1].qty-a[1].qty);const totR=rows.reduce((s,r)=>s+r[1].rev,0),totQ=rows.reduce((s,r)=>s+r[1].qty,0);let csv='\uFEFF月份,品項,銷售量（罐）,營業額（NT$）\n';rows.forEach(([n,d])=>{csv+=`${yml(S.selM)},${n},${d.qty},${d.rev}\n`;});csv+=`${yml(S.selM)},合計,${totQ},${totR}\n`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`半吊子廚房_${S.selM}.csv`;a.click();}
function T(t){if(S.tab==='set'&&t!=='set'){S.ep=null;S.em=null;S.es=null;S.sok=false;}S.tab=t;S.okMsg=null;S.cfm=null;render();}
function AC(pid){const p=S.prods.find(x=>x.id===pid);if(!p)return;const ex=S.cart.find(i=>i.id===pid);if(ex)S.cart=S.cart.map(i=>i.id===pid?{...i,qty:i.qty+1}:i);else S.cart=[...S.cart,{id:p.id,name:p.name,price:p.price,qty:1}];S.okMsg=null;render();}
function UC(id,d){S.cart=S.cart.map(i=>i.id===id?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0);render();}
function CO(){if(!S.cart.length)return;
const {sub,total,disc,custom}=calcAmt();
const note=custom?`自訂金額(原NT${sub})`:''; 
const ym=cym();
const sale={id:Date.now(),date:td(),time:tn(),items:S.cart.map(i=>({...i})),total,sub,disc:disc||0,discName:note};
if(!S.sm[ym])S.sm[ym]=[];
S.sm[ym]=[...S.sm[ym],sale];
S.cart.forEach(ci=>{
  let rem=ci.qty;const pid=ci.id;
  const bs=(S.batches[pid]||[]).sort((a,b)=>new Date(a.prodDate)-new Date(b.prodDate));
  bs.forEach(b=>{if(rem<=0)return;const t=Math.min(b.qty,rem);b.qty-=t;rem-=t;});
  S.batches[pid]=bs;
  S.stks=S.stks.map(s=>s.pid===pid?{...s,stock:Math.max(0,s.stock-ci.qty)}:s);
  S.mvs.push({id:Date.now()+Math.random(),type:'out',pid,name:ci.name,qty:ci.qty,date:td(),time:tn(),note});
});
S.okMsg=total.toLocaleString();S.lastNote=note;
S.cart=[];S.showAmt=false;S.customAmt=null;
sBatch();sMov();sInv();sSales(ym);render();}
function US(id,d){S.stks=S.stks.map(s=>s.id===id?{...s,stock:Math.max(0,s.stock+d)}:s);sInv();render();}
function UM(id,d){S.mats=S.mats.map(m=>m.id===id?{...m,stock:Math.max(0,parseFloat((m.stock+d).toFixed(3)))}:m);sInv();render();}
function UP(pid,v){S.plan={...S.plan,[pid]:Math.max(0,parseInt(v)||0)};render();}
function PD(){const req={};Object.entries(S.plan).forEach(([pid,qty])=>{if(!qty||qty<=0)return;Object.entries(BOM[pid]||{}).forEach(([mid,per])=>{req[mid]=(req[mid]||0)+per*qty});});S.mats=S.mats.map(m=>{const n=req[m.id]||0;return{...m,stock:parseFloat((m.stock-n).toFixed(3))};});S.stks=S.stks.map(s=>{const q=S.plan[s.pid]||0;return{...s,stock:s.stock+q};});S.plan={};sInv();render();}
function doDel(id){const ym=cym();const sale=(S.sm[ym]||[]).find(x=>x.id===id);if(sale){S.stks=S.stks.map(sk=>{const item=sale.items.find(i=>i.id===sk.pid);return item?{...sk,stock:sk.stock+item.qty}:sk});S.sm[ym]=S.sm[ym].filter(x=>x.id!==id);}S.cfm=null;sInv();sSales(ym);render();}
function doClear(){const ym=cym(),ts=tsl();ts.forEach(sale=>{S.stks=S.stks.map(sk=>{const item=sale.items.find(i=>i.id===sk.pid);return item?{...sk,stock:sk.stock+item.qty}:sk});});S.sm[ym]=(S.sm[ym]||[]).filter(x=>x.date!==td());S.cfm=null;sInv();sSales(ym);render();}
function toggleAmt(){S.showAmt=!S.showAmt;if(S.showAmt){S.customAmt=S.cart.reduce((s,i)=>s+i.price*i.qty,0);}else{S.customAmt=null;}render();}
function setAmt(v){S.customAmt=v;render();}
function clearAmt(){S.showAmt=false;S.customAmt=null;render();}
function togIn(pid){S.inForm={...S.inForm,[pid]:!S.inForm[pid]};S.adjForm={...S.adjForm,[pid]:false};if(!S.inQty[pid])S.inQty[pid]=0;render();}
function cancelIn(pid){S.inForm={...S.inForm,[pid]:false};S.inQty[pid]=0;render();}
function chgIn(pid,d){S.inQty={...S.inQty,[pid]:Math.max(0,(S.inQty[pid]||0)+d)};render();}
function doIn(pid,sid){
  const qty=S.inQty[pid]||0;
  const dEl=document.getElementById('inDate_'+pid);
  const prodDate=dEl?dEl.value:'';
  if(qty<=0||!prodDate){alert('請設定進貨罐數和製作日期');return;}
  const pname=(S.prods.find(x=>x.id===pid)||{}).name||'未知';
  if(!S.batches[pid])S.batches[pid]=[];
  S.batches[pid].push({id:Date.now(),prodDate,addedDate:new Date().toISOString().slice(0,10),qty});
  S.stks=S.stks.map(s=>s.id===sid?{...s,stock:s.stock+qty}:s);
  S.mvs.push({id:Date.now()+Math.random(),type:'in',pid,name:pname,qty,date:td(),time:tn(),prodDate,note:''});
  S.inForm={...S.inForm,[pid]:false};S.inQty[pid]=0;
  sInv();sBatch();sMov();render();
}
function togAdj(pid){S.adjForm={...S.adjForm,[pid]:!S.adjForm[pid]};S.inForm={...S.inForm,[pid]:false};S.adjQty={...S.adjQty,[pid]:0};render();}
function cancelAdj(pid){S.adjForm={...S.adjForm,[pid]:false};S.adjQty[pid]=0;render();}
function chgAdj(pid,d){S.adjQty={...S.adjQty,[pid]:(S.adjQty[pid]||0)+d};render();}
function doAdj(pid,sid){
  const aq=S.adjQty[pid]||0;
  if(aq===0)return;
  const noteEl=document.getElementById('adjNote_'+pid);
  const noteText=noteEl?noteEl.value.trim():'';
  if(!noteText){alert('請填寫調整原因');return;}
  const pname=(S.prods.find(x=>x.id===pid)||{}).name||'未知';
  S.stks=S.stks.map(s=>s.id===sid?{...s,stock:Math.max(0,s.stock+aq)}:s);
  const dir=aq>0?'+':'-';
  S.mvs.push({id:Date.now()+Math.random(),type:'adj',pid,name:pname,qty:Math.abs(aq),adjDir:dir,date:td(),time:tn(),note:dir+Math.abs(aq)+'罐：'+noteText});
  S.adjForm={...S.adjForm,[pid]:false};S.adjQty[pid]=0;
  sInv();sMov();render();
}

setup();
</script>
</body>
